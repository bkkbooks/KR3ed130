body:
  text: 中卷補益心腎藥方附金纓神丹王醫師方汪尚書傳金纓草二兩即蓮花心焙乾天芝即仙靈脾取汁煎四兩地芝即生地黃取汁作煎八兩忌用鐵器人參去蘆二兩銼山精即生紫花木取汁作煎四兩茅朮也乾山藥二兩銼馬芝即肉蓯蓉酒浸五晝夜作膏四兩甘草二兩略炙銼石菖蒲二兩米泔水浸一夕切焙丁香二兩去萼子上有四瓣者是不得見火蓮實肉二兩杵碎雞頭實二兩杵碎牛膝去須二兩酒浸三晝夜焙乾銼陳皮去白水淘淨焙乾五兩細切菟絲子二兩酒浸三晝夜焙乾先淘洗令淨去盡輕浮者候浸爛用好厚皮紙作極小裹緊裹定入臼杵即易碎木香二兩不見火銼白茯苓二兩去皮銼柏子仁二兩研生膏麝香二兩別研初生兒乳汁白沙蜜五兩煉熟上件除作煎別研藥外同為細末取馬芝者酒研爛成膏次入人乳令勻用天地爐用磚砌上圓下方圓者為爐方者為基爐狀如尋心神安魂魄定巴戟丸治虛怯補養心腎固精氣助丹田明耳目治小便白濁林巢先生方龍骨三錢半夏一兩洗七次桑螵蛸半兩炙山藥三分白茯苓一兩川楝子半兩炒巴戟半兩去心木豬苓一兩去皮當歸一兩洗熟地黃一兩洗硃砂三錢研為衣蓯蓉一兩酒浸一宿切片焙上件酒糊為丸如梧桐子大每服三十丸空心溫酒鹽湯下玉輅丹固精治小便稠濁夜夢陰遺不覺滴瀝雪色茯苓二兩大半夏一兩半米醋浸炒黃色桑螵蛸半兩炙白龍骨半兩別研刺雞頭實二兩谷樹子半合搗碎炒上為細末酒煮麵糊為丸如梧桐子大每服三十丸空心鹽湯下柏子仁丸治肝虛筋痿行步緩弱林巢先生方柏子仁二兩炒研熟地黃二兩洗焙枳實半兩炒去瓤覆盆子一兩去萼五味子一兩附子一兩炮去皮石斛一兩去苗酸棗仁一兩炒鹿茸一兩去毛酥炙桂心一兩去皮黃耆一兩炙白茯苓一兩上為末煉蜜丸如梧桐子大每服三十粒空心食前溫酒吞下坎離丹既濟水火補心資腎白濁夢遺林懷叔方辰砂一兩令細研入酸棗仁一兩淨酒浸去殼細研入附子一隻端正者炮去皮尖切乳香半兩令隔水乳鉢細研入上先用附子碾令細羅為末入辰砂酸棗仁乳香共附子末和勻煉蜜為丸如雞頭大每服一粒溫酒吞下空心一服須是臘月合瓷器盛龍珠丹蜀亂乾祐間藥市內有漆發朱顏道士醉飲高歌曰尾閭不禁滄溟竭九轉靈丹都漫説惟有驪龍頂上珠能補玉堂關下血有隱士丁元和異之再拜求其訣即此方也服之返老還童名白龍珠丹林懷叔方鹿茸去毛酥炙鹿角霜鹿角膠炒以上各二兩熟乾地黃洗焙柏子仁別研以上各五兩附子炮去皮臍菟絲子酒浸三宿各三兩上各為細末煉蜜為丸如梧桐子大每服三十丸溫酒空心食前下湖州真濟大師只用熟乾地黃柏子仁鹿角霜菟絲子四味等分為末酒糊為丸如梧桐子大最佳蜜丸亦得鹿角不以多少去尖截作三二寸段子用河水浸三五日瓷鉢一個以泥泥底下砌爐子一所別用河水煮令軟沸取出卻以刀子刮去皮再用原汁煮如水少再添河水以胡椒十粒黃蠟半兩同煮令透爛取出控干用汁熬令稠傾入新盆中候冷自凝成膠用只用炭火煮神仙助陽丹補氣守神澀精固陽應一切虛滑之疾皆治婦人無子服之百日有妊娠蒼朮一斤不浸用臼內木槌搗去皮川烏頭三兩紙裹炮製去皮臍龍骨二兩研為粉金鈴子三兩微炒破故紙二兩微炒茴香三兩一半舶上一半土産上為細末酒糊為丸如梧桐子大或硃砂為衣每服三十五十粒至百粒空心米飲下溫酒亦得忌桃李雀蛤一井金丸神仙變白為黑法蔣監門方牛膝三兩酒浸三日焙乾蓯蓉三兩酒浸三日焙乾白附子一兩洗川椒二兩去子並閉口者微炒木鱉子仁一兩炒附子二兩去皮臍生用天南星一兩炮舶上茴香一兩炒何首烏二兩黑豆半碗水三碗者水盡為度揀出豆焙乾萆薢一兩黑豆炒地龍一兩去土炒防風一兩炒烏藥二兩炒羌活一兩炒金毛狗脊一兩炒去毛骨碎補一兩炒白蒺藜黃耆一兩蜜炒赤小豆一兩生覆盆子一兩炒全蠍一兩炒去毒五味子一兩炒青礬一兩炒又一方用青鹽上二十三味各事持為細末無灰酒煮糊為丸如梧桐子大每服五十丸煎五味子酒送下空心日午各進一服大能烏髭發順風氣美飲食服之百日神效遇七摘去白者自然黑者自出二腎散揩牙烏髭發香附子十二兩杵去毛用河水浸三日再杵碎青鹽二兩研碎上為末炒令黑色為度早晨洗漱了每用少許揩牙上旋旋咽津不可吐棄然後服一井金丸羊肉丸治脾虛不納食臟腑滑瀉羸瘦困乏精羊肉一斤去筋膜脂皮薄批作片子炙焙乾取四兩人參二兩丁香一兩不見火陳皮一兩去白神麯一兩炒縮砂仁一兩肉豆蔻一兩麵裹煨附子半兩炮去皮尖當歸一兩洗焙桂心一兩白朮一兩乾薑半兩炮甘草三寸炙上為末煮糯米粥為糊如梧桐子大每服五十丸至百丸空心食前粥飲下不拘時候亦得破故紙丸破故紙二兩炒附子一兩炮去皮臍桂一兩去皮生用上以酒煮麵糊丸如梧桐子大每服五十丸空心食前溫酒下日三服神仙換骨丹此藥稟天地按五行順陰陽通日月之精氣安和五臟調暢三焦治五勞七傷補養真氣聰明耳目活血脈駐容顏壯筋骨添精髓祛風邪黑髭發延年益壽枸杞子天之精揀去梗熟乾地黃地之精洗淨焙柏子仁陰陽之精揀淨研甘菊花日月之精揀去梗菟絲子金之精酒浸焙桂心木之精不見火肉蓯蓉水之精酒浸焙山朱萸土之精去核焙白茯苓玉之精去黑皮漢椒火之精去合口者微炒上件揀擇好者各四兩同為細末酒糊為丸如梧桐子大每服五十丸溫酒鹽湯空心下百益煮砂丹滋養心氣補元臟久虛益腎經虛損不足蘇伯言傳硃砂一兩半山茱萸一兩半去核焙乾稱遠志去心稱一兩半柏子仁一兩半研熟地黃一兩半洗焙石菖蒲一兩半破故紙一兩半酒浸一宿炒菟絲子一兩半酒浸一宿焙五味子一兩半炒茯神一兩蓮子肉一兩穿心巴戟一兩附子八錢炮去皮臍沉香八錢令為細末山藥三兩令為細末上件各修制了為細末用豶豬心三個切開將硃砂分作三處放在豬心內用燈心一兩半同放在豬心內以麻皮系定余者燈心一處於銀石器內水煮一日一夜取出研硃砂極細余物不用將砂同藥拌勻以好酒打沉香山藥糊丸如梧桐子大每服五十丸煎子湯送下空心食前日進三服大有神效麋茸丸治腎經虛腰不能轉側蔣監門方麋茸酥炙黃燎去毛如無以鹿茸代菟絲子取末各一兩舶上茴香半兩上為末以羊腎二對法酒煮爛去膜研如泥和丸如梧桐子大陰乾如腎膏少入酒糊佐之每服三五十丸溫酒鹽湯下治腎經感濕氣陰盛腰痛者宜服更灸腎俞三七壯鹿角丸治男子真元虛憊小便白濁遺精夢泄不固蔣監門方肉蓯蓉酒浸一宿一分真者肉桂不見火去粗皮一錢韭子炒一分牡蠣煅二錢附子炮一分鹿角屑炒半兩桑螵蛸炙一分菟絲子酒浸一宿一分熟乾地黃一分五味子一分人參一分龍骨二錢雞內金焙乾稱一分鹿茸酥炙半兩茴香一分炒上為細末每服二錢空心米飲調下內一半用煉蜜為丸如緑豆大早食前及午食前各一服每服五七十丸溫酒下地黃丸補虛療損添精益髓活血明目烏髭壯陽八座常服生乾地黃熟乾地黃酒浸杜仲銼炒白朮當歸酒浸菟絲子酒浸一宿以上各三兩鹿茸酥炙鹿角霜柏子仁別研各二兩萆薢二兩上為細末研柏子仁細入煉熟蜜內和藥杵數千下丸如梧桐子大鹽湯送下五十粒空心食前服黃耆散治虛勞盜汗噓吸少氣筠翁李侍郎傳黃耆一兩銼五味子半兩白茯苓一兩白朮一兩半熟乾地黃一兩牡蠣一兩半燒為粉天門冬一兩去心甘草半兩炙上為末每服四錢水一中盞入棗三枚煎至六分去滓食前溫服日進三服救汗湯治陽虛自汗筠翁李侍郎傳桂去皮去有味者三兩芍藥三兩甘草二兩炙附子生用不去皮三兩上㕮咀每服五錢水一盞半薑五片棗二枚同煎八分去滓溫服不拘時候兩滓再煎一服釣蟲丸治傳尸勞蟲江諫議方磁石擇吸鐵緊者兼有牆壁者一兩半細研龍骨半兩上舌緊者極好麝香硇砂各一兩細研上用蠟為丸如櫻桃大每服一丸用針穿一竅子以緋線二尺余穿眼子來往纏牢留五寸許於線頭系大錢一文早晨令病者用溫水或新汲水吞下藥咽喉中令口咬定大錢後覺噁心便吐出蟲其形狀不等急以熟油煎殺或不吐蟲只吐血絲子或涎一兩合皆是安樂證更服尋常和氣湯一二日自安用過藥卻用溫水浴過更可醫一二人若是傳尸勞一丸定可活二人神仙菟絲子丸益水補腎除渴菟絲子不以多少於臼中先杵千餘下用粗羅子羅去土末等將菟絲子淨水淘過無灰酒浸五日候透軟控稍干帶潤又於臼內杵令爛粗羅羅末焙乾再搗羅為末煉蜜和杵丸如梧桐子大空心米飲下五七十丸補肝丸補肝壯腎強益滋養精血明目醫官王康傳當歸二兩熟乾地黃二兩炒生乾地黃二兩炒黃耆二兩蜜炙黃上為細末煉蜜為丸如梧桐子大每服三五十丸食後米飲下黃耆十補湯補諸虛不足安益心腎醫官王康傳黃耆半兩蜜炙人參一分白芍藥一兩甘草半兩炙桂四錢去皮當歸半兩酒浸一宿生乾地黃半兩白朮一分茯神半兩半夏一錢湯洗十遍酸棗仁二錢微炒麥門冬二錢半去心北五味子三錢陳皮二錢去白沉香一錢不見火天台烏藥一分木香一錢煨上㕮咀每服稱二盞用水二盞半生薑五片棗子三枚煎至一盞食前通口服兩服滓又煎作一服七寶丹大鎮心養真血安神魄治血虛氣結驚悸不寧周三議傳當歸一兩洗焙芎藭半兩洗桂心半兩去皮石菖蒲半兩去毛茯神一兩遠志肉半兩湯泡薑汁浸炒人參一兩去須柏子仁半兩研酸棗仁半兩去皮淨微炒以上修事為末琥珀半兩真血竭半兩沒藥半兩硃砂一兩麝香肉一錢以上細研上為末煉蜜和熟棗肉熬成膏和藥為丸如梧桐子大每服五六十丸棗湯下不拘時候杜仲散治腰痛牽引腹脅舒州劉郎中杜仲一兩去皮細銼用生薑汁並酒浸濕炒牡丹皮去心半兩桂半兩去皮上為細末每服二錢用溫酒調下食前臨臥真人去尸延年不老丹舒州劉郎中丹光真華之母松脂也浮水立云之髓茯苓也上等分松脂熟煉同和茯苓丸如雞子大日服一粒細嚼以自然津液徐徐咽下令人好顏色氣力有倍延壽不老行步輕健久服不飢耐寒暑補心丹治思慮過當膽氣受寒肝經不足心虛恍惚夜不得睡富才李傳附子一兩七錢重者去皮臍用麵裹煨去面不用硃砂一錢半研麝香半錢金銀箔各二十片上一處勻研爛煮紅米飯為丸如梧桐子大每服三粒溫酒或人參湯下臨臥服十五味大建中湯補諸虛損調順榮衛滋養氣血治五勞七傷虛汗盜汗附子一兩炮裂水浸削去皮臍人參一兩當歸一兩半洗去土黃耆炙一兩白茯苓一兩白朮一兩熟地黃一兩半五味子一兩石斛一兩細銼酒浸半日炒肉蓯蓉一兩酒浸一宿焙乾牛膝一兩酒浸一宿焙乾薏苡仁一兩炒甘草三分炙官桂一兩去粗皮不見火白芍藥一兩上件為粗末每服三錢水一大盞半入生薑五片棗子二枚小麥子一百粒煎至七分去滓空心食前服拱辰丹治體虛血不足氣有餘心神不足精神恍惚口不能言夜睡不寐人事不省心下迷悶覺如醉狀氣不宣通大小便多祕纍服藥餌不見功效宜服此藥必取神功李登仕方鹿茸四兩酒浸炙當歸四兩洗去土酒浸一宿山茱萸四兩麝香半兩別研入上為細末酒糊為丸如梧桐子大每服百丸用米飲或溫酒送下空心食前服日三服十四友丸補諸虛不足益血收斂心氣治怔忪不寧神情昏憒眠睡不得極有神效紹興王郎中方川當歸去苗淨洗干熟地黃洗焙茯神去心中木白茯苓去赤皮人參去須黃耆去須蜜炙阿膠麩炒柏子仁研極細紫石英細銼酸棗仁新者炒香熟別研細肉桂去皮不見火遠志湯浸軟去心灑酒蒸一飯久焙乾以上各一兩龍齒二兩細研硃砂三錢重細銼上件併為末攪拌和勻煉蜜丸如梧桐子大硃砂為衣每服三十丸煎棗湯下食後臨睡服此乃韓魏王方云余舊有心疾怔忪健忘夢寐恍惚不得睡世之所傳心藥者無不服少有效求盡方但亦不愈邂逅一良醫余喜其語有理云此疾本由憂悲思慮耗損心血而得之只宜先安心心不徒安必用當歸地黃輩滋養乎心之主血故也若更服發散藥如菖蒲之類則氣愈散必當收斂之始見效緣心本用過而虛更當加阿膠輩補之乃選諸家方但撰成此方集諸家之善也服之大效常以此方授人亦無不驗者始議收斂藥用訶子余曰訶子固好但宜入腸胃不若用龍齒兼此乃安神定魂之藥也桂大能行血此十四味吾之三益友故名曰十四友丸紫薇丸開心孔明目益智慮補骨髓強記去心熱治諸風補氣及治寢睡不安服三十日聲音清朗四十日顏色光澤一如童子及去面皺能令睡臥不驚功效極大更不具述呂仲權傳菖蒲遠志去苗心取皮各半兩丹參去苗土柏子仁別研天門冬去心焙乾稱各一兩防風去須甘草炙各一兩二錢薯蕷一兩半熟乾地黃二兩五味子去枝莖百部杜仲去皮橫銼炒絲斷各一兩半茯苓去皮白者茯神去木白者人參去須各一兩七錢半肉桂取心一兩麥門冬去心黃耆去須蜜炙各二兩菟絲子酒浸取末二兩上件修制如法為細末煉蜜為丸如梧桐子大每服五十丸不拘時候溫熟水吞下日二服育神散治心氣不寧二三十年不可者皆治或虛弱多驚神色昏憒怔忪健忘或言語無節有類顛邪或心志不定小便白濁飲食無味白茯苓茯神白者人參去須遠志去心焙乾稱龍骨令研如粉臨時和入赤石脂令研如粉臨時和入乾薑炮當歸淨洗白朮切紅芍藥桂心去粗皮不見火臨時入紫菀茸淨洗防風甘草炙各等分川烏炮去皮臍各半沒藥一分乳香一分安息香一分麝香一錢研上為細末相和令勻將安息香用無灰酒熬成膏搜為丸如龍眼大用辰砂細研為衣每服一丸人參酒下食後或不拘時候服如風氣攻作用防風煎湯下或茶亦得養心丹益心強志安心腎使水火通交陰陽既濟除恍惚驚悸醫官王康傳通明辰砂成塊者二兩用生絹袋子盛定用無灰酒兩碗半懸臺浸七日然後用銀石器內慢火煮令九分干用井水浸一宿研成膏子通明乳香酒人參湯研如粉入在硃砂膏同研各半兩茯神一兩半人參揀末一兩半都入硃砂乳香膏內研上和令勻入豬羊心血合成丸如小雞頭大每服三兩粒至十粒煎人參炒酸棗仁湯化服食後臨臥服固精丹升降心腎固精暖腎逐膀胱宿冷止淋漓小便頻數沙苑腎形蒺藜三兩碾羅為細末用酒一碗半慢火熬成稀膏雞頭纂五兩用熱沸湯洗過焙乾碾羅為細末菟絲子二兩酒浸一宿炒乾桑螵蛸半兩用糯米炒熟去米益智三錢去皮酒浸微炒乾為度上件搗羅為末用前膏為丸如梧桐子大每服三十二十粒空心溫酒吞下糯米湯下亦得此藥溫暖水藏去敗精療腰痛治冷氣攻小腹連臍㽱刺狀似奔豚及痃癖氣但是下元虛冷夜多小便淋漓白濁精滑不禁並宜常服又能壯氣倍力進美飲食功效甚奇如膏少即添糯米糊同丸十精丹治心腎不能升降水火不能既濟令人上熱下冷心神不寧昏昏似醉小便頻數遺精白濁全不思食縱食不成肌膚形體黃瘦上重下輕夢寐驚魘心神恍惚人參去須遠志湯浸一宿槌去心取肉用鹿茸去毛酒浸一宿酥炙令黃色柏子仁新者揀去殼半兩研石菖蒲去須洗淨一兩當歸去須酒浸一宿焙乾琥珀研生朱別研各半兩上件為細末臨時和勻每服二錢水一盞薑三片棗一枚煎七分食後服心腎丸治心腎不足水火不既濟心忪夜多驚悸夢遺失精恍惚多忘小便白濁膀腿沉重精神昏憒飲食失味盜汗少力或諸虛不足陽事衰弱常服不燥熱但平補氣血養心腎邵總管傳肉蓯蓉二兩切片酒浸一宿焙乾稱菟絲子一兩酒浸一宿取出搗成餅焙乾稱碾蓮子肉一兩去心微炒黃遠志一兩半酒浸抽去心焙乾稱人參去蘆頭一兩柏子仁一兩半別研為膏石菖蒲一兩半麥門冬一兩湯浸去心焙乾稱龍骨一兩半上舌緊真者別研附子一兩炮去皮切片子枸杞子一兩半擇去枝杈淨稱上十一味為細末卻將研者藥和勻用浸藥酒打麵糊為丸如梧桐子大每服三十丸至五十丸空心食前溫酒鹽湯送下琥珀安神丸治心氣不和肢體麻痹心忪驚憒飲食無味或耳內虛鳴常服鎮心安神木香琥珀不見火別研人參五靈脂揀淨沉香二錢半上為細末肉棗燈心煮去皮取肉為丸如梧桐子大每服四十粒至五十粒棗湯吞下空心日午服應效遠志丸治心氣虛弱神志不足事多健忘怔忪顫掉氣短耳鳴夢遺泄精盜汗無力心脾不調口苦舌乾常承務傳遠志肉薑石菖蒲去毛白茯苓熟乾地黃洗焙各三兩人參柏子仁炒杜仲炙去絲麥門冬去心黃耆蜜炙五味子揀淨各二兩澤瀉山藥酸棗仁炒去殼桂去粗皮各一兩上為細末煉蜜丸如梧桐子大以硃砂一兩半別研細為衣每服五十丸棗湯或溫酒下空心臨睡服此藥補心強記安魂定魄長養精神令人爽朗悅澤顏色發白變黑齒落重生筋骨壯健容顏不老此安神補氣藥中最妙不熱不燥溫平益智令人氣不衰日記萬言便是孫真人補心強志丸方一同但添腎形沙苑蒺藜一兩炒石斛丸治兩關脈沉緩引傳人迎短弱傳化凝澀榮衛內燥俾精神恍惚白濁遺精情思少樂四肢怠惰嗜臥不安飲食減削肌肉枯瘁凡一切不足並宜服之呂仲權傳金釩石斛須是緊細者去根白朮覆盆子揀淨稱人參去蘆頭黃耆蜜炙銼白茯神當歸洗去蘆頭五味子揀淨熟乾地黃鱉甲去裙襤醋炙令焦肉蓯蓉洗令淨酒浸焙乾稱鹿茸酥炙酸棗仁去皮干稱炒神麯炒以上各一兩沉香半兩不見火烏梅並核與肉焙乾稱二兩上十六味併為細末煉蜜搜和成杵千百下丸如梧桐子大每服三五十丸溫酒鹽湯下空心食前日可二服牛膝丸大補下元虛冷流注腳膝無力行坐不能小便白濁頭目旋暈補益真陽壯氣海柴醫傳川烏五兩每日三度換水浸令軟去皮尖細切用好酒三升煮爛為膏研細木瓜三個竹刀去皮蒂子及瓤核將艾先熟為末入在瓜內令滿蒸爛研細青鹽一兩別研川牛膝去蘆半兩羌活半兩去須巴戟半兩青皮一兩去白肉蓯蓉半兩洗酒浸切焙海桐皮半兩去外粗皮狗脊火燒去毛萆薢茴香上一處為細末將前二膏子搜勻為丸如硬入少酒和如梧桐子大每服五十丸空心食前溫酒鹽湯下此藥大治腳氣如錦丸治心包絡伏涎頭眩耳鳴怔忪語澀乳香別研蛇黃火燒酒淬如柴次別為末細研安息香薄切酒拌蒸爛研白附子微炮硃砂別研以上各半兩全蠍五十枚微炒赤足蜈蚣七條炙去頭足天麻一分酒浸一宿牛膽制南星一兩一分麝香別研一錢一字腦子別研一字本方如此今去腦子不用上為細末入研者藥和勻以水煮糯米粉作糊和丸如雞頭大每服一丸薑湯磨開服不拘時候甚者一服兩丸寧神丹治心氣不寧昏狂錯亂明州何節推傳辰砂一分研水飛人參半兩天門冬一分去心白茯苓一分白茯神一分去木南琥珀一分研滴乳香一分研酸棗仁去皮了稱一分炒研白殭蠶一分炒沉香一分上十一味為細末和勻用豬心血為丸如龍眼大每空心一丸麝香少許熱酒半盞嚼下待一時辰再以熱酒一盞飲之日二服神效一料為四十丸水仙丹專治心病補虛損治百病真辰錦硃砂一兩水飛焙乾再研細川木通一兩切白及一兩切真麻油二兩上先以木通白及入油內慢火煎候二藥焦黑去藥濾過再入銚慢火煎以水盂滴油在水上不散即取下冷之以此油少許和硃砂為硬膏用清皂角水洗去油以新汲水浸逐日早一換水每服旋丸五七丸如緑豆大空心麝香湯吞下日二服神驗補心丹治心氣不足恍惚多驚夢寐不寧昏憒人參白茯苓硃砂研細水飛過乳香別研石菖蒲麥門冬去心酸棗仁各一兩上為細末煉蜜丸如梧桐子大食後臨臥溫酒或燈心鹽湯吞下三十丸雄朱丸治丈夫婦人因驚憂失心或思慮過當氣結不散積成痰涎留灌心包久而不去窒塞心竅遂致心氣不寧狂言妄語叫呼奔走辰砂一分研雄黃一分擇有牆壁明淨者研白附子一錢為末上拌勻以豬心血和丸如梧桐子大更別以硃砂為衣每服三丸用人參菖蒲濃煎湯吞下疾去常服一粒能安魂定魄補心氣鎮神靈化痰利膈茸附丸治精血不足體倦少力夢寐紛紜常多驚悸宜常服養氣補血李登仕唐佐傳字堯卿鹿茸去毛床酒浸一宿炙附子去皮臍炮令極熟當歸洗去泥蓯蓉酒浸一宿洗熟乾地黃酒浸焙以上等分上為末煉蜜丸如梧桐子大每服五十粒飯飲或酒送下食前空心服之附子降氣湯治氣血俱虛呼吸短氣夜多盜汗飲食不進李堯卿傳附子炮去皮臍一十六兩白茯苓十二兩白朮十兩人參八兩木香二兩上五味為末每服二錢水一盞薑三片鹽少許煎至六分食前通口服遠志平肝丸治憂愁思慮痰氣潮作如醉如癡精神不守大便難通小便常濁頭目眩暈宜服此藥李堯卿傳石富蒲炒遠志去心人參去蘆頭白茯神去木川芎洗山藥鐵粉麥門冬去心半夏曲炒白附子湯泡七次以上各半兩細辛二錢半生珠別研二錢半上為末白湯糊丸如梧桐子大每服四十丸生薑薄荷湯吞下日午夜臥服龍齒湯治心怔驚悸常懷憂慮神思昏昧如人將捕狀小便赤少或多或濁宜服李堯卿傳人參去蘆頭甘草炙枳殼去瓤麩炒龍齒研北桔梗以上各一兩半半夏二兩湯泡七次黃耆炙茯神一兩白茯苓一兩半遠志去心一兩半當歸一兩半官桂二兩半上為末每服三錢水一盞半生薑三片棗子一個粳米百粒同煎七分食前服天王補心丸治證同龍齒湯李堯卿傳山藥杜仲薑汁炙百部洗人參去須茯苓白者丹參洗熟乾地黃洗焙貝母去心炒五味子石菖蒲炒遠志去心麥門冬去心茯神去木防風去蘆柏子仁別研以上各半兩甘草七錢半當歸半兩酒浸上為末煉丸每兩作六丸每服一丸水一中盞煎六分食後通口服小補心丹治證同龍齒湯李堯卿傳防風去須黃耆炙龍齒研白朮人參去須細辛去苗熟地黃酒浸乾薑炮裂附子炮去皮臍官桂去皮不見火遠志去心石菖蒲炒赤小豆炒極熟茯苓白者茯神去木以上各等分上為末煉蜜丸如梧桐子大每服四十丸煎棗子湯下日午夜臥服琥珀七寶丹治心氣不足榮血衰少多畏不樂精神昏昧魂魄飛揚心神離散夢中失精白濁等疾李堯卿傳人參去須二兩琥珀別研白茯苓茯神並去木酸棗仁炒令十分熟遠志去心各一兩乳香生朱各半兩個別研上為細末和勻煮棗肉丸如梧桐子大每服四十粒棗湯下日午夜臥服定心湯治證同七寶丹李堯卿傳人參去蘆頭三兩白茯苓三兩紫菀取茸二兩白朮二兩甘草炙一兩官桂去皮一兩麥門冬去心一兩半黃耆三兩防風二兩川芎二兩厚朴薑汁製炙去皮稱二兩上為粗末每服三錢水一盞半赤小豆七十粒煎取七分去滓食後通口服石龍芮丸治遺泄精氣不固遂成勞疾精神恍惚夜多夢魘四體疼酸上焦虛熱口舌乾澀小便白濁健忘多煩腰膝少力石龍芮生白龍骨至好澀舌者別杵細研入白茯苓遠志去心熟乾地黃酒浸一宿焙人參紫暈盤者佳去蘆頭生用麥門冬去心焙燥上件七味等分為末煉蜜和杵千百下丸如梧桐子大每服三十丸煎炙麥門冬湯下食