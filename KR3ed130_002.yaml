得上十味為末煉蜜為丸梧桐子大每服三十丸加至五十丸棗湯下人參湯亦得食後服烏梅地黃丸治婦人虛勞氣血不足生乾地黃四兩熟乾地黃四兩烏梅去仁取肉四兩赤芍藥一兩川當歸半兩川芎半兩上各焙為末煉蜜丸如梧桐子大每服三十四十丸空心食前溫酒下或作大丸嚼亦好清肺湯治婦人肺熱生風面痹川當歸一分去蘆頭稱川芎一分銼生地黃一分洗切赤芍藥一分銼防風一分去蘆頭黃耆一分去根銼荊芥穗一分切甘草半兩炙銼上為細末每服二錢水一盞煎至七分通口服食後日二服陽起石丸治婦人血海久積虛冷不成妊娠臍腹冷痛崩中帶下陽起石火煅細研二兩乾薑二兩炮白朮三兩熟乾地黃一兩洗焙吳茱萸三分湯浸洗七遍焙乾微炒牛膝三兩去須酒浸焙上為細末煉蜜合成劑搗五百杵丸如梧桐子大每服三十丸溫酒空心及晚食前附子湯治婦人諸虛補血海祛風調經進食壯氣附子一兩炮去皮臍桂心三分不見火熟地黃三分洗焙牡丹皮三分當歸一兩洗焙川芎一兩艾葉半兩炒上為粗末每服三大錢水一盞半生薑五片煎八分去滓通口服之黑神散治橫生難産此南陽公主方百草霜香白芷各等分上研勻每服二錢釅醋茶腳許童子小便用半盞調開藥次入溫酒半盞調下須是扶起産婦正坐服之如未再進一服良久便正生又催生方上用萆麻七粒去皮於乳鉢以順手研細塗足心有驗急洗去藥左轉研四十九匝粉刺方治面皯上用杏仁末和雞子白敷之一宿即落或塗之過一宿次日泔洗之積德丹治婦人一切病服之令人有子熟乾地黃四兩洗焙牡丹皮二兩去骨官桂一兩二錢去粗皮不見火上為細末煉蜜為丸如梧桐子大每服三十丸溫酒或米飲空心食前日可三服益陰丹治婦人百病及胎前産後諸疾並治之功不盡述許堯臣方卷柏洗去泥土並根二兩當歸三兩去須牡丹皮三兩白芍藥陳皮乾薑肉桂不見火白朮白茯苓香白芷延胡索茴香炒各三兩黑豆糯米各二茶盞與延胡索茴香豆米四味同炒令熟百草霜二兩別研令細上為細末煉蜜為丸每兩分作十丸每服一丸以溫酒化下食前空心時服之伏龍肝散治婦人崩下五色日漸瘦弱腹中冷痛石大夫方赤石脂川芎人參禹餘糧火醋淬火內令酥細研當歸洗去須白朮烏賊魚骨細研柏葉焙伏龍肝甘草炙阿膠蚌粉炒地黃洗去土酒浸一宿焙白芍藥附子炮裂去皮臍牛角䚡酥炙焦上等分同為細末每服三錢溫酒或米飲調下不拘時候艾煎丹治女人諸虛不足氣血衰耗長育勞傷水期不勻頭目昏重四肢困弱赤白帶下臍腹冷痛氣上搶心精神恍惚夜夢顛倒或久不成孕毛髮枯稿凡血海之疾悉治葉知縣方白艾四兩用藥以糯米粉打糊搜濕用猛火焙乾脆急搗為細末白芍藥二兩赤芍藥二兩九蒸熟乾地黃二兩生乾地黃一兩赤石脂一兩炒禹餘糧一兩燒紅醋淬五遍阿膠一兩麩炒白茯苓一兩紫石英二兩澤蘭一兩去枝梗乾薑半兩炮人參一兩伏龍肝一兩炒肉蓯蓉二兩酒浸一宿切焙乾牡蠣一兩大火煅紅上十六味為末醋糊為丸如梧桐子大每服五十丸空心溫酒或米飲吞下日三服大溫經丸治女人衝任經虛腰腹冷痛經候不勻或斷或多面色萎黃肌體瘦弱或帶下赤白久不成妊自強傳吳茱萸一兩沸湯浸兩次焙當歸半兩去須尾只用中間獨莖大芎半兩白芍藥半兩人參半兩去須牡丹皮肉桂一分去皮阿膠半兩蚌粉炒熟乾地黃二兩洗焙白茯苓一兩蒲黃一分微炒只用白芷亦佳艾葉一兩用醋滴炒赤色南琥珀二分如血色者佳附子七錢一隻炮去皮臍淨半兩硃砂一分別研入末上十五味煉蜜丸如梧桐子大米飲下四十粒空心食前日三服大忌生冷動氣之物聚寶丹治室女經寒血脈不調所下過多日漸瘦弱面無顏色不能進食並宜服之當歸洗去須木香不見火二味各半兩為細末琥珀一分別研入乳香二錢別研入沒藥二錢別研入麝香半錢別研入辰砂一分別研入上件藥和勻用熱湯和丸如雞頭大每服一粒用酒磨化空心臨睡服補血艾煎丸補虛羸益血氣治衝任虛損月水不調臍腹㽱痛腰腿沉重四肢倦怠百節痠疼心怯恍惚憂恚不樂面少光澤飲食無味除下藏風冷治帶下三十六種疾崩中漏下五色子宮久冷無子及數墮胎或因産後勞損衝任血氣虛羸肌瘦嗜臥寒熱咳嗽天陰手骨節冷痛久服補暖元臟潤澤肌膚長髮去皯除頭風令人有每服五十丸空心食前溫酒下鹿茸半兩去毛酥炙附子一兩炮裂不去皮芍藥四錢蓯蓉一分酒浸一宿焙真阿膠半兩蚌粉炒焦澤蘭葉半兩炒桂去粗皮四錢不見火川芎半兩厚朴去粗皮薑汁製半兩藁本半兩黑豆半錢炒熟防風一分熟乾地黃半兩酒浸當歸半兩去須酒浸一宿白朮四錢柏子仁四錢乾山藥半兩甘草半兩炙香白芷半兩乾薑一分炮五味子四錢去枝梗茯苓一分細辛去葉土一分卷柏去根一分川椒一分炒黑色人參一分杜仲去皮一分炒去絲牛膝一分酒浸一宿焙蛇床子一分續斷一分艾葉炒一分去梗蕪荑仁一分紫石英三分赤石脂半兩硬石膏半兩煅紅去火毒禹餘糧半兩醋淬五七次令酥脆上件同搗羅為細末煉蜜和丸如梧桐子大每服五十丸溫酒吞下炒薑酒亦妙空心食前服之沉香養血丸治女人衝任久虛風冷乘於子宮不作孕或成孕多致損墮月事或不調勻臍腹疼痛或時漏下赤白淋瀝不斷肌膚黃瘦一切血氣不調疾神驗石大夫方白朮川芎當歸焙乾川續斷熟乾地黃焙乾白乾薑炮香白芷以上各一兩大葉真艾沉香半兩銼碎上用搗羅為細末煉蜜和丸梧桐子大每服五十丸食前空心酒或米飲下日二服此即永無損娠之患神應産後汗方上如虛出汗用防風不以多少麩炒赤色碾為細末煎豬皮湯調下如傷風汗別有藥産後瀉方上酸米醋炒香附子碾為細末米飲調下治婦人面生瘡上用白膠香一小塊火上燒煙燻之妙養榮湯治男子婦人榮經不足肌瘦倦怠咳嗽發熱皮肉枯悴口苦舌乾不思飲食黃耆二兩蜜炙川芎一兩半當歸二兩甘草一兩半炙白芍藥二兩白茯苓二兩桂一兩人參二兩熟地黃一兩一分五味子二兩如婦人服去五味子加牡丹皮二兩上為粗末每服四錢水一盞半生薑三片棗子一枚同煎至八分去滓通口食前服當歸丸治婦人氣血虛損冷勞敗血攻注手足痛疼上焦虛熱口苦舌乾虛汗兼脾胃不和飲食無味人參切焙白茯苓切焙藁本洗切焙乾川芎切焙當歸洗切焙稱牡丹皮洗干稱白芍藥切焙白朮切焙肉桂去皮不見火白蘞切焙甘草切焙藿香洗曬乾不見火白芷切焙稱延胡索炮以上各半兩乾薑半兩沒藥別研赤石脂別研二味各四錢重上為末煉蜜丸如梧桐子大每服五十丸食前溫酒下人參銼散去熱解勞調順經水滋養新血藥性中和退熱無大寒極冷之劑蔡郎中傳黃耆三分黃芩熟地黃洗稱白朮赤茯苓去皮赤芍藥麥門冬去心稱以上七味各一分柴胡去苗半兩人參去蘆知母當歸去蘆甘草炙以上四味各三錢半上並生銼如麻豆大焙乾入瓷器中收每服四錢水一盞半竹葉燈心三寸長各七莖同煎至七分去滓溫服不拘時候日三服至病退即勿服詵詵丸治婦人子宮久冷胎孕不成纍有所損或多漏下皆由子藏虛弱風冷乘之常服養血無病補一切祛弱治生産過多令人虛損或蓄血瘀閉作妊不成服此永無帶下之病常使新血自安子藏堅勞須是志心服食忌生冷陳藏海味脯臘瓜薑等物及戒殺生如蟹蛤之類皆不可食如全家不殺生其驗尤速周士言自異人見傳如都水魯榮伯御史孫君孚少監韓致之皆獲其效也服此藥得效後須廣傳布異人所説如是劉郎中傳於王云澤當歸大者洗淨去須用酒浸一宿焙一兩熟乾地黃淨洗焙二兩川芎大者一兩牡丹皮一兩去心赤芍藥一兩桂去皮不見火一兩金叉石斛去根一兩川白薑一兩炮上為細末用醋麵糊為丸如梧桐子大每服三十丸至四十丸用醋湯下溫酒更妙空心晚食前日可二服歐陽慶長方加延胡索澤蘭葉各一兩尤妙當歸鹿茸丸治婦人衝任經虛月水不勻過多血崩不止赤白帶下面色萎黃腰腹冷痛日漸羸瘦鹿茸酒炙去毛一兩禹餘糧火煅醋淬七次一兩艾葉醋炒半兩續斷一兩半亦石脂七錢半當歸洗去土焙一兩熟地黃洗淨焙一兩附子一個炮去皮臍沒藥二錢半研血竭二錢半研無亦得上為細末用酒麵糊丸如梧桐子大每服三十丸至四十丸醋湯溫酒下空心晚食前日可二服四聖散治婦人赤白帶下久不愈臍腹撮痛日漸瘦弱蛇床子用象斗子滿量之二味共稱半兩燒灰酸石榴皮乾者半兩良薑半兩燒存性人參末半兩上為細末每服二錢用熱酒調下空心食前日可三服婦人催生丹劉郎中傳凌霄花去萼夜明砂滑石研上等分為細末用臘月兔腦髓並臘水合和為丸如雞頭大陰乾每服一丸臨産時面向正東用新汲水吞下立地服隨男左女右手握下藥來是驗如是難産即用水化開一丸用剪刀股或用剪子股攪七轉面東服即産
