如瘡破先用溫鹽水洗只乾摻上藥須少用內海螵蛸去面粗皮白礬銅緑少用恐多蟄人屢經神效江東李提幹傳乳香散治遠年日近寒濕注破生瘡諸藥醫不效者此藥立效小粉一兩為細末膩粉半兩乳香末三錢碾細上件藥用肥蔥白兩三根炮熟與藥研成膏貼患處帛子系定如藥干用溫湯時時潤之密陀僧散治寒濕瘡藥密陀僧半兩用鯽魚一個屠開去腸肚入上件藥在內濕紙裹放瓦上煅以魚焦為度去魚不用細研為末虢丹二錢炒過地上去火毒上二味細研為末如瘡濕用乾淨帛子搵乾摻藥如瘡干痛癢用生油膩粉調貼以帛子蓋立效觀妙散治大人小兒久蘊積熱身發大瘡亦腫膿泡血灌四弦紫黑無藥治者用此立效許堯臣方川百藥煎上二味等分為細末以麻油輕粉少許同調如糊先剝開瘡去皮蘸干膿血隨大小挑藥安瘡窠內立見徹骨清涼肉平黑消次日瘡干如久患用服杏黃丸杏黃丸許堯臣方杏仁燙去皮尖熬炒黃連去毛上二味等分為細末水煮麵糊為丸如緑豆大每服二三十丸麥門冬溫熟水下小兒減丸數並不拘時候服忌炙饌炸醬淹藏濕面之毒此方神妙不可盡述得之沈給事家藏方勝仙散治打撲傷損筋斷骨折疼痛乾薑川烏頭蒼朮當歸上四味各等分為細末用米醋打稀糊入藥末不拘多少調成膏子用厚紙上攤藥乘熱貼裹傷處如冷時即用火四邊炙令熱如干即以醋潤濕之如此三次立效仍服吃者藥如後四托散接骨止疼劉郎中方降真香香附子厚朴薑製水蛭用鹽炒焦黃各半兩上為細末每服二錢用鹽酒調下日進三服不拘時候又凡腫皆由風邪毒氣客於經絡血澀不通壅結所致其腫或無頭無根浮在皮膚之上如吹之狀或腫或散去來不常或有頭有根結成疽瘡其候非一乃寒氣與血相搏而成應系䯋腫赤瘤已潰未潰並宜用之神效包郎中方赤小豆一分芮草半兩黃柏一兩黃連半兩上件並日中曬乾同為細末用冷水調勻稀稠得所貼赤腫處立效如干再換之湯方四順生薑湯治中酒胸膈不快痰嘔噁心神麯四兩甘草一兩半微炒生薑四兩肥嫩者洗淨細擦與曲同和做餅子焙乾草豆蔻一兩半炮熟去皮麥糵一兩微炒上為細末入鹽點服之護脾快氣湯李宗丞方生薑四兩用鹽淹一宿焙乾神麯一兩炒麥糵半兩炒陳皮連白半兩草果二錢半甘草半兩炙上為末每服一錢入鹽用白湯點服沉香降氣湯趙無量通判方天台烏藥一兩香附二兩生去炙炒甘草一兩半炙蓬莪朮一兩半縮砂仁一兩上五味同為細末入鹽點服增損磨氣湯治一切氣滯胸膈痞痛脅肋刺痛疼及氣忤氣痹並皆治之生薑七片附子二錢切作片橘皮一個以上三味水二盞同煎至八分一盞去滓次入沉香木香檳榔烏藥人參白朮以上六味各磨汁半起許傾在已煎附子等藥汁內再煎令三五沸通口服之半夏湯開胃健脾溫中化痰止嘔寬膈進食半夏曲一兩炒陳橘皮一兩去瓤甘草二兩炙丁香一分草豆蔻三個生薑半兩薄切干鹽二兩淹一宿了入神麯同炒上為細末入鹽湯點服和中湯治脾胃不和嘔逆噁心疾吐清水及中酒胸膈不快楝丁香三錢熱鍋內用盞䯏良久取出縮砂仁三兩胡椒二錢半乾薑半兩炮炒鹽二兩甘草二兩碎以鹽水灑炒紫色上為細末每一錢沸湯點極醒酒清上湯化風墜痰清頭目利膈薄荷葉一兩白豆蔻去殼取仁一兩甘草四錢炙上為細末每服一錢沸湯點服不拘時候香芎湯治上膈壅痞頭目昏重神思不爽利川芎一兩洗銼焙細辛一分洗葉銼焙檀香二錢銼人香一分洗銼焙甘草一分炙銼上前件五味為細末每服一錢熱湯點服不拘時候合了用砂合盛封之洞庭湯清神爽氣寬中快膈陳橘皮不去白一斤切生薑去粗皮一斤切甘草六兩炙神麯六兩炒上前二味搗入鹽半斤固淹一宿焙乾為末白湯點服獬豸湯大治心脾疼暖胃氣思食醒酒快膈良薑二兩銼細用黃泥煮十數沸卻洗淨焙乾再用好酒浸一日再以慢火煮酒盡為度焙乾縮砂仁一兩白朮一兩銼炒胡椒半兩甘草二兩銼入鹽一兩四錢同炒紅豆一兩上為細末每服一錢沸湯點服龍涎湯山藥六兩白豆蔻仁二兩丁香二錢木香沉香半兩腦子少許上為末密瓷器盛之每服一字沸湯點服之御愛湯治脾胃所傷不進飲食胸滿不快酒食後尤宜服乾薑二兩半炮大麥糵四兩炒赤色甘草三兩炙草豆蔻仁一兩粟米四兩炒縮砂仁一兩鹽四兩炒上為細末每服一錢沸湯點服酴醾湯和氣血美飲食乾山藥四兩烏藥一兩丁香三錢木香一錢甘草一錢炒上為末入鹽沸湯點服異香湯陸寺丞方妊娠勿服荊三稜一兩蓬莪朮三兩甘草一兩半益智子一兩陳皮去瓤一兩青皮半兩上同為末每服二錢鹽湯點澄清服消食化氣寬膈養脾余甘湯四時可點陳彥序傳川百藥煎四兩乾山藥二兩甘草四兩炒勻令焦鹽二兩炒人參二錢好者去皮梢上為細末點之鳳髓湯蓮肉去心皮勻肉二兩乾山藥一兩龍腦少許上為末點之瓊液湯杏仁一兩去皮尖松子肉一兩胡桃肉半兩腦子少許上爛斫如泥入蒸蜜半斤以下再研為膏點棗湯大棗一斤用水洗淨控干薄切去核焙乾甘草三兩炒生薑一斤洗淨薄切片焙乾上為末點之香譜四和凝清百花碎瓊雲英寶篆清真文苑沉香二兩檀香半兩箋香一分甘松半兩玄參二兩丁皮一分麝香一錢新料降真半兩檀香半兩甘松半兩香白芷半兩茆香四兩笑蘭檀香三錢箋香半兩沉香一分降真半兩麝香一錢腦子一錢甲香半兩清遠茆香半兩生結三分沉香一分麝香一錢檀香半兩錦囊腦子一錢零陵香半兩麝香一錢木香半兩檀香半兩藿香一分丁香半錢醒心藿香一分麝香一分腦子一錢箋香一兩沉香半兩凝和麝香一盞丁香半兩檀香一兩半甲香一盞結香一盞甘草一分腦子一盞以上併為末用蜜少許拌勻如常法燒內唯寶篆香不用蜜備急諸方備急草方頃得之親舊間一藥治一病簡而易得附於卷末凡卒死或先疾病及寢臥間忽然而絶皆是中惡而死也上用蔥黃心於男左女右鼻中刺入深六七寸令目中血出即治又綿浸好酒半盞手按令汁入鼻中並提手足勿驚又視上唇裡弦有如黍米粒以針挑破又皂角或生半夏末如豆許吹兩鼻中卒心腹脹痛短氣欲死或已絶上以桂二兩銼水一碗煎半碗頓服乾薑亦得又布裹鹽如彈丸燒令赤置一碗酒中化服得利即愈霍亂轉筋上桑葉研汁服一盞冬月濃煮乾者又蓼一抱去兩頭水三盞煮二盞頓服用蓼乘熱捺轉筋處又生薑或乾薑或高良薑或蘇枋木濃煎汁服之若霍亂吐利後大渴多飲則殺人上黃米半升水五碗煮三碗澄清稍稍與飲之更勿與余物飲客忤者中惡之類多於道路在外得之令人心腹絞痛服滿氣衝心胸不即治殺人上以好墨為末水調二錢服又銅或瓦器盛湯著肚上轉移溫之稍冷即不用衣襯湯冷別換又鹽二錢水三盞煎一盞分二服得吐即愈中惡客忤卒死鬼擊亦相類為治可通用之上搗生葛蒲根取汁一盞灌之又燒羊屎煙令熏鼻中鬼擊之狀卒著如刀刺胸肋腹內絞急切痛不可按摩或下血衄血上熱艾如拳大水五盞煮三盞頓服又好酒一盞灌鼻中又鹽一分水二盞和攪令服並以冷水噀之吐即差又蓬莪朮酒研服一盞又車脂一錢酒調溫服又灶下黃土水調服良凡魘死不得著燈火照亦不得近前急喚多殺人上以口痛咬其足跟及足物指甲邊並多唾其面即治又皂角末如大豆許吹兩鼻中得嚏則氣通三四日者猶可救又蘆管吹兩耳並取病人發二七莖捻作繩刺鼻中又搗韭汁半盞灌鼻中冬月掘根研汁又灸足大指聚毛中三七壯又鹽湯灌之凡自縊死從早至夜雖已冷必可治從夜至早稍難若心下溫一日以上猶可救上款款抱解不解截繩放臥令一人路其兩肩以手拔其發常令緊一人以手擦胸上散動之一人摩搦臀足屈伸之若已僵但漸漸強屈之及按其腹如此一飯久即氣從口出得呼吸眼開勿苦勞動可以宮桂湯及粥清與之令潤喉咽更令兩人以筆管吹其耳中尤好若依此救無不得活又緊用手罨其口勿令透氣兩時許氣急則活又皂角細辛等分為末如大豆許吹兩鼻中凡溺死一宿者尚可救上搗皂角以綿裹內下部中須臾出水即活又醋半盞灌鼻中又屈死人兩腳著人肩上以死人背貼坐人背擔走吐出水即活又裹石灰內下部中水出即活又倒懸解去衣去臍中垢令兩人以筆管吹其耳中又熬熱沙覆死人面上下著沙只留出口鼻耳沙冷濕換之又解死人衣灸臍中即活又倒懸以好酒半盞灌鼻中及下部哀救凍死四肢直口噤只有微氣者上用大鍋釜爐灰令暖以囊盛尉心上冷即換之候目開乃溫酒及粥清稍稍與之若不先溫其心便將火灸則冷氣與火爭必死又用氈或藁薦卷之以素系定令兩人對面踏令滾轉來往如捍氈法候四肢溫和即止又手足方自冰雪中來寒凍僵直不可便向火灸及搓耳多令指節及耳隨落宜歇定飲少水近火夏月不可淘井多致殺人宜先以雞毛放井中試之如搖動不可便下是有毒物不可入古冢亦然五月七月尤甚如已中毒以水噀其面並以水調雄黃末一二錢服良久即蘇凡牆壁壓死魘死自縊死溺死産死謂之五絶上以生半夏為末如大豆許吹鼻中良久即蘇凡中熱死不可便與冷物多死救之方上取道中熱土多積心下又衆人噓其心令暖又取屋上熱瓦尉其心下又令病人仰臥以熱土壅臍上令人尿之臍中溫即愈止冷別換又延胡索為末湯調二錢服又汗頭巾湯浸洗汁服又幹薑橘皮甘草煎湯少少與之暑月遠行嘗吃少麻籸即不中暑嚼少生蔥解熱渴轉筋入腹痛欲死者上以四人捉手足灸臍左邊二寸十四壯又生薑一兩劈碎酒五盞煮濃頓服又醋煮衣絮令徹溫裹轉筋處又濃煮鹽湯通手足洗胸肋間霍亂蠱毒宿食不消積冷心腹煩滿鬼氣痛上用極鹹鹽湯三盞熱服一盞刺口中令吐宿食使盡不吐更服未再服令吐盡止卒上氣鳴息便欲絶上搗韭絞汁飲一盞立愈又露蜂房水煮服一盞又吳茱萸生薑各半兩切作片水五盞煮三盞分二服又蓬莪朮酒研服千金方論曰凡産後角弓反張及諸風病不得用毒藥唯宜單行一兩味亦不得大發汗特忌轉瀉吐痢必死無疑大豆紫湯産後大善紫酒治諸症如後上以大豆五勝炒令無聲以無灰醉酒五勝就鍋釜中乘熱飲之量疾輕重酌度多少稍熱服未安再作卒中風口不開身不著席干口灌之令汗出中風口歪頭風風痹癮殸高四肢骨碎筋傷磋跌頭破腦出中風口噤溫服外用膏藥貼破傷風入四肢角弓反張口噤不能言或産婦墮胎重者不過五劑男子女人新久腫得暴惡風入腹婦人新産廁上風入臟腑中如馬鞭噓啼短氣咳嗽先經宿勿食令腹空明早服令汗出兩食頃當下去風氣腫減慎風令十日平復風邪服令出汗風腫面欲裂破一服差妊娠腰痛婦人五色帶下風入耳角弓反張及婦人諸風極重者入雞屎白再煎服治鼻衄上以龍骨為末以筆管吹半錢鼻中九竅出血皆可用又隨衄左右以新水洗足又以左拈紙索子系手第四指咒曰血神住立止又濃研墨以蔥白蘸塞鼻中又蒜研爛貼腳心及摩手心又茅花及茅根濃煎汁服又蔥白一握搗裂汁入酒少許抄三兩滴鼻中又茶籠箬葉燒灰研細溫水調一錢服又張弓弦向上令病人仰臥枕弦放四肢如常臥又灸項後髮際兩筋間宛宛中治舌上出血上燒亂髮灰水服一錢亦治吐血下血又豉一合水一碗煮數沸溫服一盞亦治下血又小豆一合為末水三盞和攪汁飲之又幹地黃一兩膠半兩炒為末湯調下三錢日三服治小便血上茅根一把切水一碗煮半碗服一二盞又龍骨末酒服二錢日三服又當歸二兩切酒五盞煮三盞頓服又生地黃汁一盞生薑汁半盞水一盞半煮二盞分兩服治耳鼻口中血出不止上赤馬糞燒灰溫酒調下一錢凡喉閉忌以手掐摘破或即時再結愈甚或成宿疾時時仍發如急喉閉未有藥先用漆箸二隻燒令有煙含口中不得出氣候煙嗆目發嗽即破然後次用別藥又先飲生油令氣通後含他藥又巴豆一粒微煨過去皮用綿裹安耳或鼻中腫破即除去又白殭蠶直者為末生薑自然汁調下一二盞大妙又桔梗甘草各一兩銼用水五盞煎數沸服有膿出即愈又濃煮桂汁服一盞亦可末桂著舌下漸咽之又含雞屎白又含升麻即愈治卒喉腫上以韭一把搗熬熱貼項下喉上冷換之又含好醋亦治口舌生瘡舌卒腫起如吹泡滿口塞喉須臾不治殺人上以指刮破舌兩邊皮或刀破次用釜下黑煤和鹽塗舌上用酒調亦得治懸雍暴腫上以白礬鹽等分為末以箸頭點少許於懸雍上又幹薑半夏等分為末以少許著舌下妊娠忽下血胎上衝手足逆冷欲死方上以生艾汁二盞膠蜜各二匙煎一盞半稍熱頓服之無生艾即濃煎熟艾亦得妊娠胎動日夜叫呼口噤唇青及下痢不止者上以熱艾一兩酒五盞煮四盞去滓再煎至二盞服口閉者灌之亦治腰痛下血胎動及下血心腹脹者上以當歸二兩川芎一兩為粗末水四盞酒五盞煎至五盞分三服若胎未死即令安若已死即下妊娠得傷寒熱病令胎不傷上灶中黃土水和塗臍方五寸干即再塗又蔥白一把水五盞煮熟服之取汗食蔥令盡主安胎若已死須臾出小兒才生下即死救之方上急看兒口中懸雍前齶上有泡子者以指掐破便用帛搵拭血令淨若血入咽喉即殺兒謹之小兒卒患肚皮青黑不急治須臾即死上以酒和明粉塗之干則再塗又灸臍四邊去臍各半寸並鳩尾骨下一寸五處各三壯赤遊腫若遍身入心腹即殺人上以灶下黃土為末油調塗勿令乾又白豆末和水塗若入腹及入陰者以護火草取汁一盞服干及末之水調服大人小兒丹毒入腹即殺人上以水苔生地黃菘菜豆葉蒴藋葉浮萍護火草五葉藤芒硝海藻菜蕓薹大黃梔子黃芩但得一味研為末調敷之良大小便不通上以不蛀皂角去子生為末二錢獨頭蒜一顆砂盆內同皂角磨蒜盡以釅米醋少許和作餅子如錢大貼臍中立通又糞中自生菰窠採全窠者洗去泥土以水一碗煮取一盞微溫服立通此藥太緊宜量虛實酌度多少服又磨刀水服一盞婦人産後大小便不通燒發灰細研湯調一錢服又傷寒後大便不通白礬末以絹帛隔臍填礬在臍中以新水滴之通即取去白礬小便不通上以綿黃耆為末水二盞藥二大錢煎一盞溫服小兒減服又烏梅肉為末調二錢服效小兒通用又延胡索為末每服一錢溫酒調下又椿樹根直北者取直者一條不拘長短刮去皮土煎湯溫服又酸漿研汁溫酒和服魚骨鯁方上以小麥黃糵為末砂糖丸如彈子大含化如失又木耳綿裹含咽滓又令他人以諸魚骨放頭上又取魚網覆頭又蒜含鼻中又服橘皮湯又口念鸕鷀鸕鷀即下誤吞針釘𬝬子魚骨雜物方上多食肥羊脂肉及諸肥肉必自裹出又木炭研為細末每服一錢冷水調下頻服自然裹於大便中出誤吞錢方上以榨油枻燒存性為末濃煎艾湯調下二錢又服蜜二盞又濃煎艾湯服一二盞又餳頓服半斤又百部根四兩酒一升浸一宿作二服百蟲入耳上以好酒少許灌耳中起行又閉氣令人以筆管吹一耳又火炙桃葉卷之塞耳中又車脂敷耳孔四邊自出又椒末一撮醋少許調灌耳中行二十步即自出蜈蚣入耳上以樹葉裹鹽炙熱以掩其耳又炙豬肉令香掩耳即出蟻入耳上炙豬脂香物安在耳孔邊即出蚰蜒入耳上以釅醋灰濁汁羊酪小蒜汁驢乳並灌耳中又熬油麻以疏布盛枕之又細研緑礬或銅緑油調灌耳中又龍腦黑豆大綿裹如入左耳塞右耳如入右耳則塞左耳立效目睛為物損傷上以牛尿日兩次點之避風雖黑睛破亦可療之牙疼上以細辛一兩地龍四分為末入麝香少許揩患處又附子尖一分胡椒半錢細辛一字為末揩患處良久以鹽湯漱去勿咽蓽撥炮熱咬患處又乳香咬患處又野芫荽略捻動塞鼻中差治一切毒腫瘡癤若患三日內針者便散若已有膿即早較濃研好墨依此法於土牆上高處書之以竹釘子念七或十四遍云風毒熱毒一切腫毒釘入此壁深千丈萬丈急急如律令敕中間釘之七下先令病人咳嗽一聲便吸氣吹於竹釘上七釘止不得移動此法不須度受但至誠為病人救療神驗又草烏頭為末水調塗若已有頭及破者不可用以藥有毒恐入肉內害人凡被火傷急向火炙雖極痛強忍一時頃即不痛切勿以冷物拓之熱氣不出爛人筋也湯火傷未成瘡者小麥炒黑為末膩粉減半油調塗又豆醬塗又稈草灰水調塗已破者干貼又黃丹酒調塗又燒羊糞灰醋調塗又羊脛炭燒赤為末蜜調塗又醋泥塗火傷又赤皮蔥白研塗火傷又新牛糞乘熱塗之不痛又湯瓶中減為末酒塗又赤石脂研末水調塗破者油調又生面油調塗又柿漆塗之金瘡深者若以藥速合則內潰宜用此方上黃丹滑石等分細研傅之又黃連木香檳榔等分為末傅上金瘡上以石灰五倍子磁石燒氈灰錫藺脂及槐花初開者入藏瓶中泥固燒存性甑帶燒灰銀礦燒赤青蒿厚朴熟艾白藥子上但得一味為末敷之桑白皮汁地松車前根葉並搗細敷之凡傷折忌服自然銅藥上取赤銅屑細研溫酒服一二錢其骨自接又木賊三兩麻黃去節一兩甘草三分為末每服五錢熱酒調下先整骨了飲之令醉破傷風上白麵鹽各一撮新水調塗瘡又鰾不以多少於一仰一合瓦內炭火燒煙盡研細熱酒調下汗出即愈又蘇枋木銼煎濃汁灌瘡口中十數盞不令絶候瘡中黃水出為效破傷中風瘡口作白痂無血者殺人最忌治之方上以雄雀糞直者是研細熱酒調半錢服破傷風牙關緊噤上用草烏頭去皮防風為末雄黃別研等分每服一字熱酒調灌之亦治洗頭風噤了牙關者如破傷風身體強硬更用天南星二兩防風一兩為末先以熱小便洗瘡貼之有紫汁出是效治諸獸傷上馬咬用獨賴栗子燒灰貼鼠咬用麝香唾調塗獨咬用薄荷汁塗狗咬傷涎入瘡令人昏悶者浸椒水調菵草末塗豬咬松脂熔作餅子貼又屋溜中泥塗春末夏初狂犬咬人即令人狂過百日乃得免當終身禁食犬肉若食蠶蛹此毒亦發定不可救之宜忌也上先去卻惡血灸瘡中十壯明日以後日灸一壯百日乃止忌酒每七日搗韭汁飲一二盞又地榆搗汁塗瘡乾者煮汁飲以末水調塗又薑汗服一二盞治蛇蠍蜈蚣等傷上以鐵石上水磨汁塗蛇傷吳茱萸為末酒調服一錢油調半錢塗瘡又搗地榆汁飲並塗瘡又搗小蒜汁飲滓敷瘡又元娛蚣燒末唾調塗瘡蜈蚣咬唾調胭脂塗之治諸蟲毒上蜈蚣咬大蒜小蒜桑葉豉末油澱並可塗麻鞋底土搽蜘蛛咬飲羊乳又飲酒令醉壁鏡咬薑汁調皂角末破者用烏梅肉貼又蠍蜇嚼乾薑擦臘茶油調塗又蜀葵馬莧大蒜萱草汁皆可塗又驢耳垢擦蜂蟄薄荷擦又頭垢唾擦又尿泥塗又嚼青蒿擦蠼螋盡其形以刀子取腹中土唾調塗又搗蒺藜敷孫真人云見一切毒蟄之物不得起噁心向之亦不得殺若折殺之後必遭蜇治亦難差解百藥毒上以出了蠶子者蠶紙燒灰研細每服一錢冷水調下頻服取差雖面青脈絶腹脹吐血服之立活亦治牛馬誤吃花蜘蛛腹脹欲死者每用兩大匙水調灌之下喉必效解諸食毒上以生韭汁服一二盞又頭垢如棗核大吞之酒毒遍身黃者五靈脂一兩為末入麝香少許研勻飯丸如小豆大每服十丸米飲下不拘時候治橫生逆生上灸右腳小指尖頭如小麥大三壯下火立産又蛇蛻皮燒灰酒調二錢面東服又鹽塗兒足底又可急抓之並以鹽塗産婦腹上又菟絲子或車前子末酒調服二錢産後血運血迷方上以生半夏末吹大豆許鼻中又五靈脂炒令煙盡為末溫酒調下一錢童子小便尤佳又紅花或蘇枋木酒水濃煮汁飲又神麯末水服二錢治口鼻出血不止名腦衄上灸上星五十壯穴在直鼻上入髮際一寸
