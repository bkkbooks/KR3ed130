餘不拘多少洗淨用麻油點燈燒成灰稱看多少用膩粉等分和勻點擦牙旋旋滲咽下及造白粥俟瀉三兩次以粥補之不得作緩又同上擦方上以古文錢三二十文硇砂一塊揩頭大用好米醋一小盞同於建盞內熬三分去二以瓷罐收之每擦時以手撑柱坐點藥用力擦腋下凡三次候腋下小孔成瘡瘥仍不得動作恐瘡破再作氣又腋氣方神妙不可盡述許堯臣方一味飛白礬不以多少臨睡時以紙襯桌上伸手托壁柱以藥干揩令腋十分熱痛兩腋揩遍先於日中將所著上截衣服用灰汁淨洗又泡去腋袖中臭氣皆不作氣如新衣時便可著若洗氣息不斷枉用其藥大概藥無不驗多是衣服再作氣故不能去根治腋氣方上以好生膽礬如琉璃片無灰色石頭者為妙不拘多少一半生一半煨過同為細末入膩粉少許同研細每用半錢水先浴了次用生薑自然汁調藥擦患處俟十分熱疼不能忍得即已之又吃藥方全蠍一枚小兒胎頭髮一塊燒灰輕粉三十文麝香五十文上四味同研為末每服一大錢分兩處一半揩牙一半用麝香酒調下臨臥服至五更下如黑水三二十年患者亦可醫自然先用皂角水淨洗所著衣服用湯熏濕潤次燒麝香沉檀香末熏焙衣服如用藥後切不必著不熏過衣服仍被服亦須熏洗過解毒方中全蠶蠱毒蕁毒砒毒野葛河豚等毒及中一切毒不省人事而氣欲絶者皆可治以甘草末三錢冷水調下即時吐出毒即不吐高郎中方王不留行湯治五淋小便淋澀臍腹脹急痛石大夫方王不留行一兩甘遂三分炒石韋一兩去毛葵子一兩半木通二兩半車前子二兩淘去沙石滑石一兩蒲黃一兩芍藥一兩半當歸一兩半洗桂一兩上同為粗末每服二錢水一盞入小麥五十粒同煎至七分去滓溫服江諫議消渴方江諫議治消渴方夫渴疾飲食皆化為小便不歸大腸大腸祕澀世人不議更服宜藥大腸既瀉元氣敗脫其患愈甚切忌宣轉及毒食醃藏油膩之物取曰消渴消中消腎虛三焦五臟生虛熱雖則膀胱冷如水意中飲水無休歇小便盡夜不記行骨慘皮焦心肺裂本因熱酒炙饌多或醉恣欲無時節飲食雖然得美餐肌肉皮膚轉枯竭真教便利甘如蜜口苦喉干舌如血若加此狀療應難收得此方真妙訣硃砂研四兩犀角鎊四兩羚羊角鎊四兩鐵鏵粉三兩生銀末一兩天花粉二兩黃連去毛二兩真珠末二兩金銀箔各三百片上為末金銀箔別研和勻生蜜為丸梧桐子大每三十丸麥門冬熟水下早午夜各一服忌酒色炙饌鹹味面接骨丹治打撲傷損骨折筋傷皆治之生薑一斤取汁牛皮膠四兩銼碎馬屁勃二兩銼研如粟米乳香一兩細研上件薑汁入銀鍋內約多少得中多則藥太稀少則藥太厚次下膠又次下屁勃又次下乳香調和得所大紙攤貼痛處用絹帛裹定痛處紙包熱瓦尉之此藥味雖至微而功用神良薑汁不可多用太厚時旋添之洗風散治面上遊風或癮疹或風盛或黑皯茺蔚草乃益母草也晚蠶沙赤小豆黑牽牛白芷藁本去土殭蠶白附子草烏頭白蘞蔓荊子上等分為細末每用一錢澡豆用之灸男女心脾痛法陳景齊傳上灸患人腳大拇指甲肉想著處系拶近甲處肉上七壯男子灸左女子灸右蛇傷方蛇藥牛主簿傳香白芷不拘多少預碾細末麥門冬子不拘多少上二味遇有急緩以麥門冬子半兩拍碎水一碗半濃煎湯調白芷末二三錢服之如煎藥未就間且用軟帛扎定勿令毒氣走又將白芷末敷傷處神妙溫酒調極速治瘰癧方上以牡蠣用火煅淨碾為細末茶湯或酒或白湯調下二錢服多妙毒物皆從大便下此極妙治打撲傷損方此寒岩昂老傳黃柏皮去粗皮天南星淨洗生用上二味等分為細末以生薑自然汁調擲放皮紙上貼在打撲損處其藥骨碎折者皆見神效藜蘆散淋洗痔疾藜蘆半兩甘草半兩川椒半兩附子半兩蛇床子半兩羌活半兩獨活半兩芍藥半兩當歸半兩苦參半兩上為末每服三錢松柏枝桑枝各一握水一大碗煎至六分入於瓷瓶內將痔坐於瓶口且熏候通手即洗至冷住可再暖再洗日可洗三二上為佳此藥極妙千金不傳治五十年痔不差方上塗熊膽取差乃止神效一切方所不能及枳殼煎孫道士方枳殼二兩用湯燙去瓤麩炒焦黑色稱綿黃耆一兩槌扁蜜炙稱不蛀皂角熱炭灰中炮裂去核不去皮二兩荊芥穗去枝梗塵上一兩上為細末煉蜜為丸如梧桐子大專治腸風痔漏久年內外痔不差疼痛大閉澀壅盛者皆治每服三十丸空心溫湯下或陳米飲亦得如小便澀更加白茯苓一兩香岩老痔方海螵蛸密陀僧龍骨煅了白礬各等分梅花腦子須是成片十分大片好腦研細真麝香研細各少許上先將前四味研極細後入二味和勻登溷了以溫鹽水洗過用藥攤油單或帛子上可大小敷之聚香丸治腸風痔漏生龍腦半錢麝香半兩水磨雄黃一錢密陀僧一錢丁香末半錢安息香一分乳香一錢木香末一分以上並各自研川巴豆五個去皮心膜以紙壓出油須是去盡油為度真砒霜半錢入緑豆粉二錢同研勻真阿魏半兩上先將安息香研細施入阿魏一處研續入余藥遂一味入研留龍腦麝香最後入研勻細用湯浸蒸餅心少許搜成劑得所丸如梧桐子干瓷器內封盛不得透風每日空心濕臘茶清下一丸服藥後不便處有垢膩生大便作阿魏氣息卻吃平時發病毒物攻令復作仍不住服藥直候吃毒物其病不作即是根本已去也治腸風臟毒方上原桑葉第二次坐者陰乾為末每服方寸匕米飲調下治久新內外痔方治痔不以內外新久皆治皆效上以五倍子不拘多少為細末煉蜜為丸梧桐子大食前溫水下四五十丸忌葵茱海物等治腸風下血方治腸風下血亦以五倍子不拘多少燒存性為末每服二錢空心陳米飲調下陸行之痔方一用青黛末一用當歸苗為末兩味皆獨用上先將冷水洗痔揩乾微濕用藥乾摻如痔不濕即以水調成膏塗之二方前後屢用極驗又以木槿花之葉陰乾為末遇痔作時塗摻其上即不痛治外痔方上採蓮子草俗謂之鬼蓮生道邊甚多用一握以油鹽少許同揉細去卻此小汁約去一半汁罨穀道處頻頻咳嗽痛立止此藥極妙不可盡述抵聖散治五般淋疾赤芍藥一兩檳榔一個上為細末每服三錢水一盞半煎至七分溫服不拘時候舒州劉郎中傳通神散治砂淋熟乾地黃焙定州瓷器上等分為末煎燈心通草湯調末二錢熱服不拘時候三兩服立效曹少卿服極有驗輕粉散治小腸不通蔥一莖膩粉五文上以粉入蔥內用線系兩頭以水一盞煮熟蔥入乳鉢內都研細以煮蔥湯調下孫巡檢湯方孫巡檢治渴方若服金石致渴即不能治熟乾地黃四兩山藥二兩山茱萸二兩桂一兩澤瀉一兩半牡丹皮一兩半白茯苓一兩半附子一兩覺熱去附子加五味子四兩用童子小便浸一宿焙乾上為末蜜丸如梧桐子大每服五七十丸米飲下空心食前服或二服氣滑加龍骨一兩瓜蔞丸上以瓜蔞根末蜜丸梧桐子大米飲或新水下百餘丸以多為妙食後臨臥日二服瓜蔞根散治三焦消渴心煩體熱皮膚生瘡瘙癢天渴利之病隨飲即小便也此謂服石藥之人房室過度腎氣虛耗故也下焦既虛虛則生熱熱則腎燥燥則渴渴則飲水腎氣既虛又不能制水故小便利其渴利雖差熱尤未盡發於皮膚皮膚先有風濕濕熱相搏以生瘡也瓜蔞根二兩赤茯苓二兩玄參一兩枳殼三分麩炒黃去麩並瓤苦參甘草三分炙赤上件為細末不拘時候溫漿水調下一錢於郎中傳治吃水水蠱方治吃水渴病水蠱上用多年黃牛穿鼻木卷子一個削成片子用二盞水煎成一盞溫服立效治刀斧傷方治刀斧傷或人咬上以竹園荽生者乾者皆可於口內嚼十分細貼傷處不得見水三日又一方用真定䒷米乾摻治蜘蛛蜂蟄方治蜘蛛及蜂蟄上以蓽撥成膏敷之立不痛治湯火傷上取久年厚尿鹼洗淨藏瓶內以火十斤煅訖取出細研麻油調雞翎敷之治蠱毒方林景度方上以川升麻不拘多少焙乾為末鹽湯點二錢先服了即不納毒已中毒而後服即番吐出聖授奪命丹解一切毒沈檢法傳名觀音散山慈姑一兩乃是玉簪花根生白花者麝香半錢別研五倍子三兩大戟半兩續隨子仁一兩別研上三味搗羅為末同麝香續隨子仁一處研勻收藥東向用糯米糊和丸作四十九丸候一宿入葛布袋挂通風處治百藥毒打撲發背蛇虎一切毒用薄荷茶磨下發背山慈姑煎湯磨下蛇虎咬用雄黃水磨喉閉腮頷腫痛涎潮膈上語言謇澀中風暴病大腸熱結清水磨下小兒驚風薄荷湯磨下産前産後皆可服一切毒瘡清水磨下傳此藥神效不可具述治驢涎馬汗毒物傷方治驢涎馬汗毒物所傷牛主簿傳上以白礬飛過黃丹炒令紫色等分一處貼患處荊芥散治血妄行口鼻中出血不止劉郎中方荊芥菜連根二莖一名小薊生地黃生薑薄荷葉上四味一般勻停細研入蜜少許拌勻如鼻中血出用冷水調下如口中血出溫湯調下立止傷方側柏散治內損吐血下血或因酒太過勞損於內或血氣妄行其出如湧泉口鼻皆流須臾不救此藥不過二服止劉郎中方柏葉一兩半蒸乾者人參一兩去蘆荊芥穗一兩燒灰上為細末每服三錢入飛羅面二錢和勻新汲水調如稀糊相似啜服血如湧泉者立效黑虎丹治腸風下血及酒毒大便血諸藥不差者劉郎中方白礬二兩飛研雞冠花一兩乾者黑龍尾屋下煤半兩青皮去白四兩五靈脂四兩生上為細末分一半用米醋二升慢火熬成膏子候冷和一半末為丸如梧桐子大每服二十丸陳米飲下空心食前服立差血餘散治瀉血藏毒下血一服效劉郎中方血餘半兩燒灰雞冠花根葉皆用一兩柏葉焙乾一兩上為細末每服二錢溫酒調下臨臥服來晨飲酒一杯投之立愈金露丸天寶七年內王元覽進金露丸治腹內積聚癥塊久患大如杯及黃瘦宿水朝暮咳嗽積年冷氣時復腹下盤痛絞結衝心及兩脅徹背連心疼痛氣不息氣繞臍下狀如蟲咬不可忍又治十種水氣反胃吐食嘔逆飲食多噎五般痔漏蹇氣走注風有似蟲行手足煩熱夜臥不安睡語無度又治小兒驚疳婦人五邪夢與鬼交沉重不思飲食昏昏欲如夢不曉人事欲死懼多或歌或哭不定月候不調心中如狂身體羸瘦莫辨莫狀但服此藥萬無失一無不平愈是病皆療更不細述林巢先生方草烏頭炮黃連各二兩桂心不見火乾薑炮桔梗茯苓去皮柴胡去苗蜀椒去目炒用汁吳茱萸湯浸七遍厚朴薑汁製用人參去蘆菖蒲米泔浸一宿紫菀去苗鱉甲醋炙為度芎藭洗焙枳殼去瓤麩炒貝母去心甘遂炮乾地黃洗焙甘草炙防風以上一十以末各依所制過度焙乾訖各一兩巴豆去心膜用醋煮三十沸焙乾取一兩不去油用上件為細末以麵糊丸如梧桐子大每服五丸心中痰患米飲下心痛酸石榴皮湯下頭痛石膏湯蔥茶下一切脾胃氣橘皮湯下傷寒麻黃蔥湯下腳氣水氣杏仁湯下水瀉氣瀉龍膽草湯下赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下胸膈咽悶通草湯下婦人血氣當歸酒下如不飲酒當歸煎湯下亦得疝氣嵐氣小腸氣及下墜附子湯下常服及應急諸般疾患米飲熟水茶酒任下如傷冷腹痛酒食所傷酒疸黃疸結氣痞塞鶴膝風並用鹽湯鹽酒下治三十六種風十二疰無不醫治此藥前人用之效者馬遂臨老渾身楚痛不思飲食每夜五丸至七日下血如雞肝者二日餘下臭膿二升以此遂愈三原主簿陳勝妻有病十五年羸瘦腹中楚痛不可忍服藥至旬日下青蟲六十四條如箸頭身赤色及藥水五升遂愈京兆府工曹柳行余著床經年服至十日下肉蜣螂一百有餘個青黃水一升許遂愈王元覽有門客久患羸瘦吃食轉吐服之下肉蝦螞七個青水一升遂愈興國寺僧澄清患癰塊十五年服十日下肉蛇二條遂愈後來又患風疾眉毛盡落服至一百日出五色蟲兒並青水三升遂平復此元覽進方時所陳也後代鄭教授云此方於杜相公府子弟處曾用之無不治效如與小兒吃時一丸分作四丸量兒大小可下三五丸合蚍藥如煮巴豆時須是躬親自數三十沸便傾出焙乾若沸過即藥無力服此藥別無所忌只恐服食人看驗病症不定用湯便有差所以不驗也此方必用方中亦有之但無此治症且以元覽為元鑑故別而出之換骨散治大風疾尚書舊於江諫議方上録者金星石銀星石寒水石太陰玄精石磁石禹餘糧石各一兩上各槌碎如皂子大用膠泥裹作一團子將四斤炭攢之方安頂火煅火盡伺冷搗羅為細末和之令勻每服用一兩分為五服每服二錢作五日用別用水銀二錢半膩粉二錢半比之二味於漆碗內用小葫蘆兒研之不見水銀星子為度亦分五服作五日用每服三錢換骨散二錢水銀膩粉共一錢將芝麻油一兩半調之先令患人於囟門灸艾炷七壯壯如棗核一半大可爾灸畢然後用前藥油渾身塗之藥盡為度用衣被蓋之汗出藥入矣每日早晨一服五日五服極難取者不過五服用盡一兩藥也俾轉盡膿血及腹內不痛即不用塗也若或三服或四服腹中不痛不須用藥然後看下項動靜之候塗藥後先須口內有涎其涎乃黏並口中臭其腳熱腹內做聲一陳肚痛要人揉肚同患痢之狀便是動靜之應也取下膿是病之根也七日中不得吃冷水七日外出入無妨口吐黏涎不得怪也宜少語恐口痛又或口中無皮及牙斷腫痛亦不得怪五七日自安忌酒色併發風物一百日其疾永不發動後服補藥聖救散一百日聖救散天麻赤箭萇松鬼臼羌活人參細辛去苗何首烏炮防風去蘆頭蔓荊子烏麻子各一兩生用天南星用薑汁炒令黃色款冬花虎腦骨酒炙白花蛇烏蛇二味湯洗酒炙黃色牛膝酒浸去蘆麻黃去節蛜𧌴炒附子炮藁本地骨皮甘草炮天門冬去心麥門冬去心川當歸洗去土炙黃硃砂研雄黃研乳香研雲母粉研以上各半兩紫菀去土苦參各一兩半萆薢一分上件三十三味依法修制杵羅為末每服一錢半米飲或茶清調下每日早晨日午臨臥日三服治臁瘡折監稅傳上以古牆上螺螄殿須多年蝕破者燒為灰入少輕粉麝香乾摻治口瘡楊鈴傳治口瘡不安黃連黃麥糵等分木香比二味稍增上為末填入瘡內即生肌治血淋許堯臣傳泰侍郎方木豬苓一兩赤茯苓一兩車前子半兩滑石一兩澤瀉一兩阿膠二兩麩炒上粗末每服三錢水一盞同煎七分去滓食前五更時服至天曉小便清瑩其不知去處鐵刷瘡藥治男女一切瘡傷疥癆冷漏瘡痔漏瘡男女下部蠹精疳蝕瘡小兒劫頭瘌痢頭瘡走馬疳瘡無問大人小兒久患諸般瘡疥但是皮肉痛癢有膿汁有形無名並皆用之如鐵帚刷云天下無比堯臣用之三十年惟恐不用用無不效許堯臣方苦葶藶子半兩白膠香一錢旋研別入蛇床子半兩雄黃半兩別研入貫衆根半兩象斗子二錢刷洗密陀僧一分苦參半兩大柏皮半兩黃連半兩藜蘆須半兩前草揀淨取半兩輕粉半錢旋入上各不得火焙猛日中曬碾羅為末巴豆七粒敲損麻油一兩煎至巴豆黑取淨油去巴豆調輕粉隨油調藥稀稠得所瓶收十年不壞用時先煎蔥鹽湯洗去舊硬瘡皮挹乾擦藥如小兒令小兒睡著擦上疥癆炎火邊抓損通身搽擦令肉熱止次日如剝卵神妙不可言治眼目洗眼珊瑚散治氣眼風眼內瘴外瘴青盲雀盲赤眼黑花羞明不能視物不問久近並皆治之每一料用淨白鹽三斤沸湯泡淘去不淨澄清用瓷甕或銀器以炭火熬成霜不得犯鐵器直候鹽霜幹了稱一斤乳鉢內略研過不令作塊每一斤用飛過辰砂一錢重晉礬稱一錢以下八分許重研細然後與鹽辰拌勻如珊瑚色凡洗時用二大錢許以不熱不冷湯半碗以下卻用銀盂子或銅盂子盛趁不冷不熱時先以溫湯洗去眼上汗然後以藥洗之澀痛為度若冷再以銀盂子暖動一服可作三次洗洗訖卻用溫湯洗去鹽水第二第三次如前用畢可潑在淨處此方乃韓州李太尉遇一聖僧傳之云是台州人後尋覓不知所在再三祝令不可容易傳之徑山佛日得此方藏之甚祕還睛膏還睛膏洗眼藥鷹爪黃連四兩新汲水洗淨曬乾為末膽礬半兩青鹽半錢輕粉五文黃丹三錢滴乾香一塊如楊梅核大研蠍梢一十四個為末梅花腦二錢五分如魚以鹿栗腦亦得上用研勻每用二字以沸湯浸熱洗之地黃丸治男子婦人肝元風虛眼目昏暗視物不明生地黃四兩生洗熟地黃四兩生洗防風一兩去蘆枳殼一兩湯浸去瓤麩炒牛膝一兩去根酒浸一宿石斛一兩去苗頭杏仁一兩湯浸去皮尖炒上件為末入杏仁膏研和令勻煉蜜為丸如梧桐子大每服三十粒用炒黑豆淋浸酒下早晨日午臨臥各服增明丸治肝腎虛眼昏菟絲子五兩酒浸三宿附子十個去皮臍生切作兩片上用生地黃汁三勝煮附子煮令汁留七合取出附子同菟絲子為細末用余者地黃汁打糊為丸如梧桐子大每服三十丸空心鹽湯溫酒下夜光育神丸能養神明育精氣主健忘益智聰心補血不壅燥潤顏色遠視移時目不䀮䀮穀道調適久服目光豁然神宇泰定語音輕微就燈永夜眼力愈壯並不昏澀不睡達旦亦不倦怠服兩三月後覺神清眼明志強力盛步履輕快體氣舒暢是藥之效常餌如飲食一日不可輟唯在修合洗滌潔淨藥材須件件正當不宜草率熟地黃洗淨曝乾酒浸牛膝去蘆頭酒浸枳殼淨洗去瓤麩炒赤色菟絲子淨洗瀝乾以酒別浸單研遠志淨洗就潔淨砧上槌碎取皮去骨木地骨皮須是取淨洗砧上槌取皮去骨木春夏等分秋冬減半當歸淨洗曝乾酒浸上件等分逐一稱過分量均平除地黃菟絲子別器用酒浸其餘五味同銼細共入一鉢或甕內若每件藥十兩時可用無灰濃酒六升同浸三宿取出文武火焙乾須試火令得所不可火太猛恐傷藥性十分焙乾搗羅為末以兩手拌令十分勻煉蜜為丸如梧桐子大每服空心鹽酒下三十丸增至四五十丸亦不妨若不飲酒鹽湯下亦得但不如酒妙煉蜜法冬五滾夏七滾候冷以紙貽惹去沫藥成丸後都入微火焙少頃入甕收何撿詳傳此方在南康朱章之所刊方中明目人參丸張㨰龍傳人參一兩半決明子一兩半菟絲子二兩酒浸三日別研黃耆二兩蜜炙覆盆子二兩枳殼一兩炒黃去瓤上件藥焙乾碾為細末煉蜜為丸如梧桐子大每服三十丸溫酒食前服防風散治眼昏去肝風張㨰龍傳防風一兩麥門冬一兩去心旋覆花一兩羌活一兩細辛一兩甘草一兩炙香白芷一兩荊芥一兩上件藥焙乾碾為細散每服二錢茶調下食後服洗眼千金散當歸一兩赤芍藥一兩川黃連一兩上焙乾研為粗末每用一錢水一小盞煎八分去滓溫熱用綿惹汁頻洗通關吹鼻散張㨰龍傳零陵香一分藿香一分甘松香二分藜蘆一分細辛一分丁香二十一粒川芎一分上件藥焙乾碾為細末入腦子少許每吹少許入鼻中日三二吹治內障眼方上以蒼朮半斤切片纍豆一小升用水二碗煮干焙碾為末糊丸如梧桐子大每服三十粒空心鹽湯吞下又方菊花四兩木賊四兩去節蒼朮二兩銼荊芥穗二兩甘草二兩銼上同為末每服三錢茶調服日二服二藥兼之乃佳食後臨臥補睛丸治眼睛楚痛及頭疼偏正發作無常沒藥研乳香研白殭蠶炒石膏煅荊芥穗不焙川芎不焙羌活洗地骨皮洗去泥白附子炮當歸洗切焙白朮附子炮去皮臍上件等分依法修製為末以蔥涎搜為丸如梧桐子大每服十五粒食後蔥茶吞下或薄荷茶下亦得乳香散治眼睛疼痛林子啓傳通明乳香二錢研青黛一錢焰消一錢通明雄黃一錢研上件為末每用時先口中含水鼻中搐半字吐卻水仰頭少時防風羌活散治風毒上攻眼睛疼痛林子啓傳防風洗切焙羌活洗切焙黃耆洗切焙家菊花去蒂野菊不要川芎焙荊芥穗不焙白蒺藜炒杵去尖甘草炙以上各半兩上件為末每服二錢麥門冬熟水調下熟水茶並可林子啓傳當歸地黃丸養血益肝治目當歸二兩去蘆洗淨焐干酒浸一宿枸杞子二兩揀淨焙乾熟乾地黃二兩用竹刀切細不得犯鐵器菟絲子水淘去沙石及浮者酒浸一宿再以水淘過控干先研碎焙令乾稱二兩上除地黃外併為細末再將地黃於石臼內搗爛添煉蜜搗丸如梧桐子大每服四五十丸空心食前米飲下溫酒亦得三賢湯治風毒入眼迎風有淚雨皆濕赤癢發難任視物昏昧久用養目力活血脈使面目光澤眼力明健川當歸二兩和頭尾細銼赤芍藥二兩細銼荊芥取穗四兩細銼上三味並生用拌勻平分三服以薄絹袋盛逐日早用水二升煮至一升取出袋兒控干每至早晨洗面後以藥水熟洗眼並洗面上使至水冷不用藥袋兒來日早再煎洗凡一袋得五七次煎卻再換觀音洗眼藥治眼瞼赤爛銅青二錢重細研羅過白善土一兩研羅用水飛過取上面浮濃者去滓澄干稱半兩用上二件細研每用半錢匕沸湯浸半盞以下熱洗眼以紙覆之一日洗數遍每洗以湯坐令熱日一易之龍樹鎮肝丸治肝腎俱虛風邪內葉眼目昏暗或頭風偏牽眼漸細小或青盲雀目諸風內外障者不過十數服立愈酒忌房室忌面炙煿雞魚辛辣發風動氣物但於暗室中坐不可使心無不應驗每服二十丸龍腦薄荷湯食後下石大夫方草決明二兩炒人參半兩家菊二兩川芎一兩黃芩一兩玄參一兩地骨皮一兩防風一兩上同為細末一料用粟米粉三兩蒸熟為丸如梧桐子大每服只可二十丸溫酒吞下食後夜臥時服定痛散治眼睛暴痛不可忍者漢防己不以多少上為細末每服二錢溫酒調下不拘時候服羌活散治一切內外障眼翳膜遮睛久治不明者服之神效羌活半兩川芎半兩旋覆花去梗半兩防風半兩去蘆甘草生一兩蒼朮米泔水浸一宿去皮切不見火一兩楮葉一兩八月中採陰乾甘菊花去梗一分楮實一分蟬殼一分去土木賊去節一分桑葉陰乾八月中採稱一兩上為細末每服二錢茶清調下早晚食後臨臥日可三服穀精丸治大人小兒雀目攀睛穀精二兩為末羊肝一具薄切片子三指大用黑豆二合同穀精草以水二大碗同煮乾為度取出控干上和黑豆不以多少時時嚼吃如恐不肯吃時初煮乾時乘熱入臼內搗成丸如緑豆大每服三十丸茶清湯下食後臨臥服小兒隨大小加減服還睛散治風熱毒氣攻眼血貫瞳人赤𦙒痛澀龍膽草洗赤芍藥當歸洗去蘆各等分上為末每服二錢用茶湯調下食後臨臥服小兒半錢蜜湯調下三退散治丈夫風熱眼婦人血風眼腫赤疼痛年年發作服此大效許堯臣傳高司法方蠶退紙五月者蛇退殼洗剪碎焙蟬蛻殼洗去土草龍膽草去根節木賊去根節防風去蘆黃芩洗羌活洗以上各半兩白蒺藜炒去殼取仁三錢上九味同為細末先泡南硼砂湯洗眼卻每服二錢炒黑豆淋湯調下食後臨臥時服日進三服又方用羊子肝不拘多少入黃芩末銚子內入水少許煮熟先食肝次以汁吞下青州白丸子三十丸雀盲黑花眼患服此取效為度治咽喉口齒治喉閉方林巢先生方盆消不以多少為末以筆管子吹藥入喉中甚妙開喉散林巢先生方盆消二文青黛三文腦子二十文上為末每用少許以筆管子吹藥入喉中治口瘡方林巢先生方薔薇莖葉冬用根上細銼濃煎湯漱之大效小兒誤吞物啞方林巢先生方卷柏茯苓上等分為末溫水調下一錢立取下誤吞一切物金石草木之類悉能取下失笑散陳左司傳治蟲牙疼川升麻細辛去苗蓽撥胡椒甘松去土白芷上等分擇淨為細末每用少許揩患處閉口少時頑涎出若甚者用二錢百沸湯浸乘熱漱之涎出立愈治急喉閉方上以皂角去皮子為末用箸惹藥點腫處次用醋調二三錢塗外腫處須臾自破血出即愈齒藥方陳希夷方川烏頭炮裂去皮臍稱四兩白殭蠶微炒四兩華陰細辛半兩青鹽一兩皂子一百個炮燒存性不蛀者上同搗為末食後臨睡如齒藥用永除齒患烏髭齒藥方生乾地黃二兩豬牙皂角二兩巨勝子一兩黑芝麻是也槐枝二兩取著大木生緑者青鹽一兩威靈仙半兩去土取細子稱蔓荊子半兩上用一藏瓶鹽泥固濟一指厚上留一竅子候乾入藥在內用炭火約半稱煅候煙欲盡去火地上開坑取藏瓶藥置坑中以土培之經宿取出細研以瓷器收之旋取揩牙一捻如神散治風腫牙疼諸藥不能療者華陰細辛好者去苗葉隰川地龍去土二味各半兩麝香一錢稱上先將前二味為細末次研入麝香再同研勻每用半字擦痛處無不取速效堅齒散酸石榴一個丁香母二十一個華陰細辛二錢川升麻一錢青鹽一錢上件先將丁香母散插在石榴內黃泥固濟令乾猛火煅成煙盡取出放在地竅內出火毒去土入前三件碾為末早晚揩牙良久溫水漱口誤咽不妨常用去風黑髭堅肌骨能令牙齒百病不生無牙疼苦赤之患沙河塘余醫傳吹喉散治大人小兒喉閉腫塞水漿不下硼砂一分龍腦一錢白殭蠶二十一個直者別研青黛一錢硝石三錢馬牙硝一錢半白礬一錢半生膽礬一錢半上件各研細再同研令勻用好新筆管抄少許吹在咽喉內立效勝金散治腎熱上蒸牙齦浮腫牙齒疼痛或腎元虛冷牙齒動搖或赤腫痛風牙蛀牙並治之老生薑十兩切如錢薄攤干用砒霜一錢細研拌和薑錢令勻留少許砒霜放銀沙鍋內放砒霜拌薑錢於上按令緊以新瓦一片蓋鍋口炭火煅令煙盡傾於碗內盞子和定存性要成黑炭不可白卻蓽撥二錢全蠍二錢胡椒二錢華陰細辛二錢上四件焙乾為細末並薑炭亦為細末拌勻每用手指點少許揩牙齦上閉口候有涎沫出吐之不可咽仍以鹽湯漱之治魚骨鯁方上用淨水一盞左手屈第三第四指用大指及第二第五指托起水盞次用右手掐子上念吾順東流啓毒攝七遍噴氣入水中令被鯁人飲水立愈仍面東北南星散治纏喉風林景度方白殭蠶直者焙乾天南星大者炮置地上盞蓋候冷用上各為細末每味挑一錢用生薑自然汁小半盞調勻呷治喉閉方甚多此方最妙高醫增蛇蛻半夏白礬各等分防風散治齒痛徐大卿傳防風二兩附子二兩蜀椒二兩莽草一兩乃樟木葉上為細末溫青酒一盞和少許含不要咽汁以余酒漱口十年患者亦差一漱散理牙痛川芎細辛防風防己升麻莽草各等分郁李仁別研上為末煎漱口黑龍膏治咽喉腫痛九種疾急喉閉纏喉風結喉爛喉重舌木舌遁蠱蚛蝶飛絲入喉舒州劉郎中傳人參末一錢甘草末二錢酒一合百草霜一錢不蛀皂角二條以水三升浸一時辰揉汁去滓上件同熬成膏次入霜梅上白鹽硇砂焰消各少許再煎一兩沸為度如有患人先用水漱口次以鵝毛點藥掃喉中有惡涎或自出或下腹可一兩度引藥方歇良久喉中惡物出盡為度白衣觀音丸治誤吞麥芒針刺銅鐵啞者及喉閉痛魚骨啞殭蠶半兩烏魚骨去殼半兩白茯苓半兩甘草半兩炮貫衆一兩半縮砂仁半兩硼砂二錢研麝香一字研山豆根半兩真珠屑少許象牙屑少許上為末用飛羅面打糊為丸如梧桐子大蚌粉為衣陰乾每服二丸冷水浸藥頻頻呷服忌雞犬婦人見合藥將一丸含化亦妙安腎散治風熱上盛牙齒蟲蛀但是牙疼苦齒之患用此立有神效許堯臣方五倍子香白芷草烏尖蓽撥上各等分銼如米豆大炒令煙出存性為細末先以百沸鹽湯盥漱令知其熱痛吐出用藥遍揩良久去涎再用鹽湯漱立止再用治瘡腫傷折白龍散治干瘡白龍骨半兩黃柏一兩去粗皮蜜炙黃連一兩去須白蘞一錢半銼碎白及一錢半銼碎上件為末先用荊芥甘草煎湯洗用為雞子清調藥敷在瘡上定一服可忌動風炸醬淹藏毒物黃金膏治一切癰疽腫癤已成未潰宜用之江諫議方乳香研半兩木香半兩當歸去蘆半兩松脂研半兩防風去蘆半兩金毛狗脊去毛半兩楓香乳即楓樹脂是半兩白及半兩白芷半兩白蘞半兩白朮半兩杏仁去皮尖半兩上淨洗細銼用清油一升半安鍋內文武火養一宿候油冷下諸藥又以炭火養之三日勿令太沸長如魚眼候白芷黃為度濾去滓入黃蠟四兩再煎令溶入細羅黃丹一兩攪勻入瓷合內候凝即成可用紙花攤膏子量大小貼之靈應神異膏太上無比靈應神異膏治癰疽瘰癧腫癤惡瘡葉京丞方露蜂房一兩剪細事持淨稱蛇蛻半兩細剪亂髮如雞子大男子者綿黃耆三分細銼玄參半兩細銼黃丹五兩後入清油一斤杏仁一兩去皮尖先爛研上先將油入鐺內便下亂髮煎溶盡次入杏仁候色黑濾去滓再入匜內然後入余藥候焦黃再濾去滓次入黃丹候沫出變色以柳木篦子攪五千攪滴入水中候凝軟硬得所即傾入淨罐內如末甚硬可再攪五六百下也即成如常法用治陰生瘡方治陰生瘡痛不可忍上用田螺殼自脫者好燒存性為末入些膩粉生油調抹先用鹽湯洗如濕甚尺乾摻之亦妙治抓破面方凡面抓破及生瘡癤初安斑痕未褪者上以橄欖核磨滓塗之即愈仍無痕迹香連散治熱毒瘡院子湯成黃連半兩黃柏一兩輕粉一錢蛤粉二錢乳香半錢上為末用豬膽調敷或先以豬膽點瘡然後用藥摻亦敷淋泄方治熱毒瘡鷺鷥藤五兩山茱萸一兩漢椒一兩琵琶葉一兩連根蔥十莖苦參二兩槌碎上煎湯將腳擱放盆上用布罩蓋露腳趾候下得手從腰上淋泄下生肌真珠散仇防禦方定粉二兩白蘞一兩黃丹半兩炒地上出火氣上為末乾摻瘡用紙花子護之嵌甲藥石大夫方白礬枯乳香一分麝香半兩訶子五個取皮為細末黃丹半兩炒上同研細每用先洗淨溫干摻藥少許立干即剪去永除根本神