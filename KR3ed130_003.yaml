body:
  text: 下卷小兒方雞冠散治小兒瘡子出後卻黑陷不快上以雄雞二隻先令斗數合隔開割取冠上血五七點入麝香少許調酒服之白帛散治小兒霍亂吐瀉胃虛不食生胃醒脾江諫議方白豆蔻仁一兩藿香半兩生乾地黃一兩丁香一兩肉豆蔻一兩人參半兩乾葛一兩訶子皮一兩上為末每服半錢至一錢水一合至半盞剪絹錢三片煎三兩沸溫服食前忌生冷果子醒脾散小兒生胃氣去風醒脾江諫議方川升麻一兩白扁豆微炒一兩知母一兩白茯苓一兩山藥一兩人參半兩上末之每半錢至一錢水一合至半盞生薑一片同煎三五沸溫服不拘時候溫驚辰砂膏治一切小兒驚風及陰陽癇江諫議方乳香末一兩赤腳蜈蚣一條白附子半兩硃砂一分全蠍半兩生腦五十文麝香五十文神麯一分鴉兒兩個去皮尖乃草烏頭至小者如此大躑躅花一分淨揀上為末蜜丸如梧桐子大硃砂為衣薄荷湯磨化一丸更量小大加減服之忌生冷調中散補虛調氣止泄定嘔生胃氣江諫議方木香訶子皮白茯苓白朮人參藿香上等分為細末每服二錢水一盞入於林檎三小片煎三四沸通口服量小兒大小加減一錢或半錢服之忌黏膩之食銀白散治因吐泄後脾困欲生風江諫議方白扁豆百粒炒甘草二錢炙白茯苓半兩殭蠶直者二七個去嘴炒白朮半兩炒人參半兩山藥二錢白附子三個糯米半合炒上為末每服半錢至一錢水一合至半盞薑棗煎三兩沸稍熱服不拘時候忌當風奶乳薄荷散治夾驚傷寒胃風及瘡疹欲出則連服此立效江諫議方干薄荷葉一兩白殭蠶洗去嘴一兩炒麻黃去節半兩甘草炙半兩白附子炮半兩羌活半兩蠍一分炒天竺黃一錢半上為末每一字至半錢水一合至半盞煎三四沸溫服不拘時候服忌炙煿煎炒香物治小兒虛汗盜汗方治小兒虛汗盜汗驚汗江諫議方上以草龍膽洗淨為末蜜丸如緑豆大每十丸至二十丸日午臨臥麥門冬熟水下石家天麻防風丸治小兒驚風身熱睡臥不寧啼哭常服鎮心安神化風利膈墜痰天麻半兩人參半兩防風半兩全蠍一分去毒生用甘草半兩炙白殭蠶一分炒去絲以上同為末硃砂一錢半研雄黃二錢研牛黃一錢研麝香一錢研以上同研與前藥同拌勻上煉蜜丸如皂子大每服一粒人參湯或薄荷湯化下丁香和胃膏治小兒胃虛嘔吐不止胸膈痞塞丁香人參藿香葉枇杷葉塗薑汁炙去毛肉豆蔻麵裹煨白茯苓甘草炙以上各半兩水銀硫黃各半兩同研勻入無油鐵銚內以微火慢慢炒令熔不住手攪成沙子別研上為末攪勻煉蜜為丸如雞頭大每服一丸煎生薑棗湯化下空心食前日三服消疳丸治小兒疳百藥不療汪淑人方大麥糵炒神麯炒蕪荑炒黃連去須上等分為末以豶豬膽蒸熟取汁和宿蒸餅研如薄糊然後入藥拌勻丸如麻子大量兒大小加減空心米飲下二十粒臨時增減小兒無時日三五服小兒肥白丸治疳極妙汪淑人方川楝子去核取肉淨者四兩乾薑二兩同為末煉蜜丸如麻子大每日空心十粒二十粒臨時增減服之米飲下小兒人參白朮丸治小兒脾虛吐瀉不思飲食李宗丞方當歸去蘆洗二錢半白朮二錢半人參二錢半川芎二錢木香一錢真橘皮去白二錢上為細末煉蜜丸如小雞頭大乳食前溫粟米飲化下一二丸治吐瀉極妙蘆薈丸治小兒嘔吐及五疳八痢身體瘦劣頭髮焦乾疳氣腹脹小便白濁寒熱往來飲水無度臟腑冷滑乳食不化蛔蟲自出亦名六神丹郎中干革方木香丁香訶子煨去核肉豆蔻水調麵裹炮熟去面以上各用二錢上件為細末再用使君子末蘆薈各二錢蘆薈別研共一處為細末和勻棗肉為丸如麻子大每服五七丸或十丸飯下不拘時候觀音散補虛調氣進乳食止泄和胃益脾人參一錢白茯苓一錢半甘草炙赤一錢白扁豆一錢略炒木香一錢炮神麯二錢炒上為細末嬰兒一字二三歲半錢四五歲一錢用水一藥注或半銀盞生薑半片煎十數沸服食前白朮散治小兒身上微熱或渴或瀉周提幹方人參一分白朮一分白茯苓一分藿香葉半分甘草一分乾葛一分上為粗末每服一大錢用水八分盞煎至四分盞溫服食前或瀉則入薑棗煎小兒身多熱便是疳或口臭涎多則以田螺殼火燒留性碾為極細末入麝香與擦開俟涎出即以水漱口吞亦不妨兼服金箔鎮心丸保生丹治小兒急慢驚風其效如神趙少卿宜人方天南星炮白附子炮硃砂研麝香別研以上各半兩蛇黃四個辰地上煅鐵色者用楮葉研自然汁塗卻以火煅金赤色用生甘草水灑出火毒研令極細上件修事了用端午日三家粽子尖為丸如梧桐子大用淡竹瀝磨下一丸此方神聖不可慢易一粒可救一人兼能治丈夫婦人一切風疾薄荷酒下二丸至聖保命丹治小兒胎驚內吊腹肚堅硬夜啼發熱及急慢驚風惡候目睛上視手足抽掣角弓反張忽然倒地不省人事但是驚風悉皆治之趙少卿宜人方全蠍十四個用頭尾全者青色為佳炒硃砂二錢光明有牆壁者佳研麝香半錢研防風去蘆一錢金箔十片臨時入研令勻天麻白殭蠶新羅白附子二錢炮天南星一錢炮蟬殼二錢洗去土焙上為細末用粳米飯丸如此大硃砂為衣初生兒每服半丸乳汁化下用歲一丸薄荷湯下亦得三五歲有急候者只用兩丸為一服五歲至十歲常服一丸此藥性不冷大鎮心壓驚悸安魂魄去驚邪神效世之名醫多固妙藥或未得此方請合一料方知治療如神人家有小兒者自合之庶不為銀粉所誤先冷脾胃即別緻生病也五疳丸治小兒五疳八痢肌體羸瘦毛髮焦枯使君子去皮略炒稱鬥兩蝦螞燒存性稱三錢胡黃連略炒稱三錢五加皮略炙稱半兩人參去蘆頭稱半兩陳橘皮陽浸去白焙乾稱二錢上件同為細末淡麵糊和丸如麻子大每服斟量丸數服之不拘時候王醫師方世室丸治驚悸安睡去風此方治小兒風熱作驚最妙張維宋方人參半兩焙防風半兩焙硃砂半兩細研白茯苓一分龍齒一分馬牙硝一分細研紫河車一分用黑豆煮軟切作片子焙甘草一分炙上為細末後入硃砂和勻煉蜜丸如雞頭大以金箔十片為衣每一丸薄荷湯化下牛蒡散治小兒陰腫牛蒡子黃芩川椒併為細末上等分取蔥白自然汁調塗腫處肥兒丸治小兒消積化疳蟲許堯臣方皂角十莖不蛀好者打碎巴豆肉三十粒上用河水煮一日夜去皂角巴豆肉爛研用爛飯丸如黍米大每服二三丸飯飲下馬兜鈴丹治小兒肺壅咳嗽大便不利如大便利不須服此馬兜鈴一兩紫蘇子一兩炒人參一兩木香半兩款冬花半兩以上為細末杏仁一分湯浸去皮尖細研上件拌勻煉蜜丸如黍米大每服二十丸煎生薑湯下龍骨散於郎中方夫小兒盜汗者為睡臥而自汗出也小兒陰陽之氣軟弱腠理易開若將養過溫困於睡臥陰陽氣交津液發泄而自出汗治小兒夜常有盜汗黃瘦白龍骨半兩牡蠣粉半兩黃耆去蘆頭人參半兩麻黃根半兩熟乾地黃半兩甘草炙赤半兩麥門冬去心一兩上件粗為散每服二錢水一盞煎至五分去滓不拘時候溫服小兒消食丸常服溫胃補脾和氣消食厚朴洗去皮一兩六錢生薑半兩切同搗爛焙乾炒青橘皮洗焙稱一兩二錢人參一錢半木香一錢半白麵八錢炒附子一枚炮去皮臍上同搗羅為細末水浸蒸餅和丸如黍米大風吹乾每服五十丸不拘時候米飲下蟬殼散治小兒夜啼蟬退十四個硃砂等分上同為細末每服一字男兒揩上齒齦女兒揩下齒齦治疳肥瘡治小兒頭上疳肥瘡禿瘡等方豆豉一合炒焦黑白礬半兩燒膩粉一錢上研極細其瘡先淨剃去發用小便一盆子燒稱錘令赤淬入小便中乘熱洗瘡去瘡上皮更洗待血出無妨又以帛子拭乾生油調塗只一服立差小兒當歸丸治小兒脾胃不和嘔吐泄瀉腹痛膨脹或身熱當歸二錢半人參二錢半川芎二錢木香一錢白朮二錢半真橘皮去白二錢上件為細末蜜丸小雞頭大乳食前溫粟米飲化下一二丸日可三服五靈脂丹小兒疳藥張氏方因嗽成疳常服尤佳名五靈脂丹五靈脂半兩蟾頭一個塗酢炙微黃蟬殼半兩炒款冬花半兩以上為細末青黛一分研雄黃一分研上糯米飯丸如黍米大每服十粒煎人參湯下量兒加減服沉香黃耆散小兒盜汗沉香黃耆散沉香銼半兩綿黃耆蜜炙銼半兩參去蘆半兩當歸洗焙半兩赤芍藥半兩木香二錢半桂心二錢半上為細末每服一大錢水一小盞薑二片棗二個同煎六分去滓食前溫服治瘡疹如孛泡方治大人小兒大瘡疹如孛泡已破者石以黑黃牛糞燒成灰用瓦盞合在地上研為末貼在瘡上並無癍痕補脾丸治小兒脾虛臟冷大便青色腹痛啼哭人參二錢微炒茯苓一錢微炒白朮一錢微炒丁香一下四粒懷干肉豆蔻一個炮川白薑一錢炮黃連一錢半去須甘草一䔷炙上為細末倉米飯丸如黍米大每服五十至七十粒米飲下治眉上生瘡方治小兒眉上生瘡上以地龍糞二兩飯二兩飯須才揭開甑就上面取者和地龍糞細炭火燒令煙出細研如瘡干用漿水調敷瘡濕則乾摻之香橘丸治疳瘦可思粥食泄瀉不常使君子去殼稱一兩肉麵裹煨黃熟為度取出細銼再焙乾用訶子半兩去核稱半生半熟神麯炒半兩麥糵半兩炒厚朴半兩去粗皮薑汁製炙香為度甘草炙赤色半兩陳橘皮去白用一分木香炮一分上為末煉蜜丸如櫻桃大米飲化下小兒牛黃丸小兒牛黃丸治言語謇澀痰盛頭昏神不清爽每服十丸生薑湯下食後服之天南星半兩微炮白附子半兩微炒蠍梢一分去毒炒硃砂半兩研牛黃一錢研麝香半錢研上為細末薑汁和丸如梧桐子大硃砂為衣如前服小兒清肺湯治感風寒咳嗽不止人參茯苓貝母炒黃色桔梗去蘆米泔浸一宿焙甘草炙杏仁湯泡去皮尖半夏湯泡七次上七味等分為細末每服一錢用水一銀盞入薄荷同煎至七分去滓通口不拘時候並進三服取效加生薑三片煎服尤妙大黃湯治初生小兒洗胎瘡明州黃郎中方洗藥大黃川芎朴硝當歸以上等分㕮咀煎湯服之又傳敷藥密陀僧散治小兒胎瘡密陀僧黃連黃皮黃丹石膏以上等分事持淨為末和勻敷之生犀人參散治小兒胃氣虛弱及虛熱潮作張郎中傳人參二兩北桔梗三兩乾葛三兩白茯苓三兩犀角一兩半鎊白朮半兩甘草半兩炙黃色上為末每服二錢水一小盞棗一個煎七分如泄入燈心七莖煎如傷寒用淡竹葉七片溫服日二三服脪驥丸治筋骨弱不能行生氣血張維宋傳熟地黃洗淨焙乾稱半兩白芍藥半兩銼焙虎脛骨醋分炙黃色稱半兩白殭蠶洗淨稱一分炒黃色黃耆一分蜜水浸炙當歸洗淨去尾焙乾稱一分白茯苓去皮稱三錢不見火日乾桂去粗皮取肉稱一分懷干川芎一分銼焙上件九味搗羅細末煉蜜丸緑豆大每服二十丸米飲吞下日三四服沉香消疳丸治嬰孩小兒疳極羸瘦沉香消疳丸初生男兒胎衣一具洗淨麝香酒煮熟爛研如泥秦艽一分洗淨俟干稱炮過沉香一分木香一錢半炮黃耆一分蜜水浸炙胡黃連半兩白朮一分麥門冬去心一分白芍藥半兩生乾地黃半兩人參半兩白茯苓半兩蘆薈一兩肉豆蔻一分麵裹煨熟麝香一錢研和上件為細末用前膏搜為丸如緑豆大每服三十丸米飲吞下日二三服人參膏治小兒脾胃虛或因吐瀉後乘虛伏驚或乳食化遲胸膈不利吐涎食久而不除多變風證捶頭齧齒手足不遂項強目斜有時上瞟或發搐搦咽喉涎鳴睡中自驚進退往來人參膏羌活一兩天麻一兩川芎一兩人參一兩白朮一兩乾蠍一兩頭尾全者炒令香熟白殭蠶一兩直者炒令香熟蟬蛻一兩藿香葉一兩天南星一兩炮白附子一兩炮上同搗羅為細末後入真麝香一兩研細稱與諸藥弄和勻煉蜜為膏入杵