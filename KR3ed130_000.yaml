body:
  text: 跋葉氏錄驗方大廉先世所傳平日受用者也大廉少好藏書而於方書尤以注意宦遊四方每歲率傳錄成冊雖所積卷帙甚富前此未見人用或用而未見其效與夫大廉疑之而未敢輕用者皆不敢傳之於人大廉嘗見醫家有能療人之疾而少肯授人以方者每自思之與其施藥於人豈若錄己驗之方使其傳之寢廣遂略分門類別為上中下三卷𩩲壽春劉良𦙀三山許堯臣二醫士詳加校正而鑱木於龍舒郡齋淳熙丙午孟冬朔延平葉大廉謹書上葉氏錄驗方太社頃在龍舒面以見授具言集此書之不苟余歸而試之如治傷寒神捷解肌湯補心氣七寶丹等藥皆有奇效予後為霅為婺日兩獄遇有病囚居民間值時氣輒施解肌湯為劑動以數十斤計服者無不立愈得名神捷誠不忝江淮間人多信用之它所或未之見予故刻之冬陽郡齋嘉泰甲子九月望洵陽李景和書
