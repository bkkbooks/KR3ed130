body:
  text: 上卷治諸風靈寶丹治一切諸風中風癱瘓傷風等疾林統制傳沒藥一兩半川烏三兩去皮尖略炮胡椒一兩五靈脂三兩木香一分硃砂一分別研細為衣麝香一百錢別研細和硃砂為衣乳香一分研上件七味生為末以乳香擇辰日辰時取東方井花水細磨成膏約調上件藥為丸如此大每服一丸生薑二片同藥細嚼茶酒任下不拘時候蓋遇傷風頭痛則服此如胎風荊芥湯下萬金丹治一切風左癱右瘓筋脈拘急手足頑麻頭旋目眩皮膚瘙癢遍身生瘡及風毒走注肢體浮腫或暴中賊風口眼喎斜並暗風交腦偏正頭痛及婦人血風等疾並皆治之藿香葉躑躅花天南星洗麻黃不去節蔓荊子甘草炙香白芷甘松去土以上各一兩草烏頭七兩生用川芎二兩何首烏二兩五靈脂一兩酒浸一宿去沙石白膠香一兩令研沒藥三錢令研麝香二錢蛤粉一兩為衣上件除蛤粉用為衣外十五味搗羅為末糯米粉一盞無灰好酒一升煮糊為丸料劑每兩作二十丸不得焙不得見日窨干每服一丸或二丸茶酒嚼下忌熱食少時不拘時候若牙關緊急者用酒磨灌下萬金散治風補虛順榮衛通氣血及治腰膝沉重腳弱無力醫官杜壬以此治手足風纍驗其壻孔宣傳續斷杜仲去粗皮炙香切桂去粗皮取有味處不見火防風牛膝酒浸焙細辛華陰者白茯苓人參當歸切焙甘草炙以上各一兩川芎獨活秦艽去土熟乾地黃以上各半兩上為粗末每服五錢匕水二盞煎至一盞濾去滓不拘時候但腹稍空熱服文潛云豫嘗病左臂不隨後已痊平而手指不便無力試諸藥不驗遂服此藥方才半劑即愈夢仙備成丹治卒中急風左癱右瘓口眼喎斜語言不正不省人事一切風證皆治川烏一兩炮微黃色乳香一錢研五靈脂取淨半兩沒藥一兩上四味為細末煉蜜丸如彈子大每服一丸如服藥時先以酒一盞生薑七片薄荷心七枚同煎至七分去滓候溫入腦子一字細嚼藥一粒窨氣少時用先煎酒送下臨臥服切忌動風及濕面等如空心兼服升降氣藥助之此方傳於前福建巡轄王舜臣王云鎮江劉節使家方也透骨丹治諸般風疾左癱右瘓口眼喎斜腳手無力四肢沉重乳香一兩研細沒藥一兩研細川烏一兩去皮尖草烏二兩去皮尖破故紙一兩瓦上炒川芎一兩晚蠶沙一兩酒炒荊芥穗一兩海桐皮一兩去粗皮自然銅赤小豆上為細末酒糊丸如梧桐子大每服十丸至十五丸茶酒任下食後臨臥服心安丹治癱瘓及尋常些少風氣婦人血風並宜服之沒藥二兩研蠍酒浸焙羌活虎骨酥炙獨活防風去須芎藭川烏頭一兩炮去皮臍當歸洗薏苡仁炒前胡各二兩橘紅一兩半夏二兩薑汁製一宿天麻一兩白朮半兩麝一錢腦子半錢白花蛇一兩酒浸一宿去皮炙去骨雄黃一兩研枳殼一兩去瓤麩炒細辛一兩去苗上件為末湯浸蒸餅候冷濟去水丸如彈子大硃砂為衣每服一丸荊芥茶嚼下纍有癱瘓人服之如神萬靈丹治一切風及頭面諸風皮膚不仁多生癮疹手足頑麻等疾服諸風藥不差者曾得效大川烏頭炮去皮臍黑附子炮裂去皮尖新羅白附子炮裂以上三味各二兩五靈脂一兩白殭蠶炒去絲一兩白蒺藜炒去刺一兩沒藥研半兩硃砂研半兩乳香研半兩防風半兩天麻半兩白礬枯研半兩細墨三錢上件前六味同為末後七味修事了一處同合和勻用井花水一大碗研墨盡為度將汁搜和入杵臼內搗五百杵了丸如彈子大窨干每服一粒用生薑半兩去皮擦取自然汁將藥於汁內磨化盡以無灰酒一盞同浸化溫服後能以酒投之以助藥力尤佳食後稍空臨臥服十華丸治諸風濕氣相搏兩臂沉痛附子三兩生用不去皮臍大川烏頭一兩半生用不去皮臍白朮四兩一分羌活四兩一分炒黃耆四兩一分蜜炒肉桂四兩一分去皮不見火桔梗四兩一分乾薑八兩半炮裂陳皮八兩半洗去塵土不去瓤甘草八兩半炙五加皮八兩半上為細末取宣州木瓜去皮瓤蒸爛研細和上件末丸如梧桐子大每服二十丸或三十丸空心溫酒鹽湯下如未知藥力漸加丸數服以知為度石膏丸治偏正頭疼噁心痰逆石膏四兩水飛細研川烏頭一兩生去皮臍硝石一兩半細研太陰玄精石二兩細研上四物研勻如粉細生薑自然汁煮糊為丸如梧桐子大每服十丸至十五丸荊芥穗煎湯下重者不過三服大效趁痛丸大治臂痛金毛狗脊一兩炮去毛川烏頭一兩半炮去皮臍川萆薢一兩乳香三錢研沒藥半兩別研防風一兩五靈脂一兩上各事持稱搗為細末一處勻和以醋糊為丸梧桐子大每服三五十丸食後荊芥茶下天真丸治男子婦人半身不遂手足頑麻口眼喎斜痰涎壅塞及一切風氣他藥不能療者小兒驚風大人頭風婦人血風並宜服之天南星三兩洗淨切白附子三兩生去皮切川烏頭三兩生去皮尖稱切半夏五兩湯泡洗七次去皮切全蠍一兩炒烏梢蛇酒浸取肉炙乾半兩白花蛇酒浸軟取肉炙乾半兩白殭蠶直者一兩炒麝香半錢別研硃砂三錢研作衣上件焙乾為細末入麝香研勻用生薑自然汁煮麵糊為丸如梧桐子大硃砂為衣每服二十丸食後臨睡溫酒或好茶吞下此方是長安路上有人患風癱瘓手足不遂遇一黃衣道士云何不服青州白丸子加四肉藥患者云已服白丸子不效何名四肉藥因告曰二蛇一蠶一蠍因與方得效故名此方道正名清迪傳方乃盧至道洞臻之高弟醒風湯治諸風痰作頭目眩暈天南星去皮臍生用四兩防風去苗二兩甘草一兩炙上為㕮咀每服五錢水兩盞薑十片同煎七分去滓溫服不拘時候氣不和者加木香二錢半頭面如蟲行者加全蠍一錢活血丹治諸風傷損草烏二兩半生去皮地龍去土半兩木鱉子二十一個去殼及去油用川芎半兩五靈脂一兩半荊芥穗二兩半真沒藥一兩通明乳香一兩白膠香一錢重麝香半兩上為細末以麝香滴水為丸如彈子大每一丸分為四服以生薑自然汁及薄荷汁同好酒磨化下六神散治一切頭風無問三五十年證患者一服立效許堯臣方白朮白芷蒼朮洗甘草炙川烏草烏各生用亦不去皮尖各等分上件慢火焙乾為細末每服一字食後以臘茶點下此藥宜先合下一月以外方好服此關居士得之李純慶御藥神妙方五將丸治寒濕腳氣腳膝浮腫腳弱沉重抬不動服之立效仙靈脾和枝葉用一兩細銼牛膝去須一兩半酒浸一宿焙乾生木瓜兩個刮去瓤萆薢一兩半銼金毛狗脊一兩去毛銼上除牛膝外用粳醋一碗浸前四味逐旋傾入鍋內炒至醋盡為度候乾為細末再以醋同浸牛膝酒煮麵糊為丸如梧桐子大每服三十丸冷酒吞下空心食前服之許堯臣方行氣木香散治腳氣風氣走注風寒濕氣並皆治之腳生細黃泡瘡形如濕癬汁不幹者極妙黃耆半兩蜜炙黃桑白皮半兩蜜炙木通半兩細銼白朮一錢半木香一錢半黑牽牛一兩生上為細末每服一錢五更初以溫酒調下隨老弱人加減服之乍苦此疾一服見效許堯臣方七生丸治頭風頭昏痰眩諸風喉閉涎潮等疾川烏半兩去皮天南星洗半夏洗乾薑乾葛白附子白殭蠶去嘴以上各一兩並生用上為末生薑自然汁為丸如梧桐子大蛤粉為衣每服十丸至十五丸生薑湯下食前大醒風湯治一切諸風卒中涎潮痰厥神昏語澀李唐佐字堯卿傳大附子生用一兩天南星生用一兩全蠍半兩防風二錢半川芎二錢半上㕮咀每服三大錢水三盞薑七片煎至八分溫服十味四介丸治肝腎氣虛腿膝無力行步艱難狀如腳氣一切風氣冷痹並宜服之牛膝酒浸一宿天麻宣木瓜肉蓯蓉酒浸一宿四味各一兩虎脛骨半兩銼作片子塗酥炙令焦黃色川烏頭半兩炮裂水浸去皮臍乳香半兩別研入沒藥半兩別研入五靈脂半兩麝香一錢別研入上件將七味為細末入別研藥一處和勻酒煮麵糊為丸如梧桐子大每服三十粒至四十粒用溫酒送下食空臨睡服通頂散初中風口噤人事不省者先用此藥搐之令醒方用下項藥及治傷風頭疼昏眩妙躑躅花一分黃者水磨雄黃一分研飛細辛半兩上三味為細末入雄黃同研勻不省人事時挑一字搐入鼻中即醒涎出口開便下一粒金丹醒風湯等依次第對症投之蠍附散治頭風頭皮腫痛兩太陽穴疼及頭旋眼暈香附子炒去毛一兩大川芎一兩桂去粗皮半兩蠍梢二錢半上件同為細末每服二錢水一盞蔥白二寸山茶少許煎至七分食後服香芎餅子治諸風頭痛憎寒拘急腦昏掉眩旋運欲倒肢體疼痛鼻塞聲重呵欠多嚏又治目昏冷淚赤脈弩肉及面黑皯疵頭癢多白屑趙良實傳天麻一兩去須芎藭五兩淨刷去尖吳白芷二兩上搗羅為細末煉蜜為丸每一兩分作三十餅子每服一餅茶湯任下不拘時候十味銼散治臂痛連筋及骨舉動艱難此藥亦補心益血養筋生力當歸二兩去土洗淨切焙乾黃耆二兩炙白芍藥二兩芎藭一兩半不見火防風一兩半附子三兩炮裂去皮臍白朮一兩半茯苓七錢半熟乾地黃七錢半略洗淨用少酒熬令乾焙之肉桂一兩去粗皮不見火上件並修制了畢然後稱之㕮咀每服四錢重水一大滿盞生薑七片棗子三個擘開同煎至七分去滓通口服食後臨臥日三服須溫覆厚衣畏寒去處大防風湯專治上巔腫痛乃是風寒氣相搏克川芎一兩防風一兩炙附子重八錢者二枚炮裂去皮臍用天南星一個大者約重二錢半生用白朮二錢重甘草三錢重上件為粗散每服重四錢水一大盞半薑七片棗二枚去核蔥白三莖煎及七分去滓溫服日進二三服不拘時候治風癇方久年癲狂羊聲倒地不省人事或狂走持刃不禁此摧伏肝邪蛇含石不以多寡火煅九次醋淬至酥研令極細用狗膽取汁丸如龍眼大男子用雄狗膽女子用雌狗膽如過發時以一粒人參煎湯磨下每日服一粒四時加減續命湯麻黃去節川芎白芍藥羌活杏仁去皮尖麩炒各一兩附子炮去臍皮尖半兩防風一兩半川烏炮去皮尖甘草炒人參焙肉桂去粗皮不見火黃芩以上各三分當歸四兩酒浸一宿切焙上為粗末每服二大錢薑錢三片棗一枚水一盞半煎至七分通口服不以時候春加麻黃一兩夏加黃芩三分秋加當歸四兩冬加附子半兩風虛加川芎一兩失音加杏仁一兩燥渴加麥門冬子乾葛各一兩腳弱加牛膝石斛各一兩身疼痛加秦艽一兩上氣浮腫喘急加防己一兩虎骨輕腳丸治肝腎不足經絡受邪腰腳重痛手臂不仁一切腳氣之疾石仲虛大夫方威靈仙洗去土稱二兩蒼朮二兩洗焙虎脛骨二兩酥炙沒藥一兩研草烏頭二兩湯浸兩宿焙乾以鹽二兩炒令黑色篩去鹽上五味同為末以篩下鹽同打麵糊為丸如梧桐子大酒下三四十丸不拘時候太陽丹治頭痛感風氣積偏正夾腦一切頭痛風壅痰盛咽膈不利石大夫方石膏二斤別研腦子二兩別研川烏大者一斤炮去皮臍川芎一斤白芷一斤甘草一斤炙上為末水麵糊丸一兩做十八粒礬紅為衣每服一丸細嚼用荊芥薄荷茶送下食後夜臥各一服蠍附丸治風氣壅盛痰咳不已半身不遂頭目昏重神思不清半夏二兩湯洗天南星一兩白附子半兩白礬半兩生蠍梢二錢不炒硃砂一錢細研為衣上為末薑糊丸如梧桐子大食後熟水下十五二十粒治風七灸法凡中風孫真人防風湯用麝香竹瀝煎者尤佳可於千金方中檢之蓋治風不服續命湯不為治風之法也仍須訪尋砭灸之法者治之益佳治風之法有七穴一百會穴二耳前髮際穴三肩井穴四風市穴五絶骨穴六曲池穴七三里穴若有能針砭人須會流注法補瀉方始有功如不能莫如且著艾灸七穴依銅人經法點穴灸之灸氣海不若灸關元三寸蓋少陰太陰厥陰三經皆屬關元少陰腎之經太陰肺之經厥陰肝之經一穴灸了三經所以勝於他穴也又石先生云此是腳氣亦令灸三里絶骨之類一年三次灸為佳常令降氣向下或居僻無醫但於痛處灸之更宜合千金翼腳氣門中治風青丸常服之佳青丸乃後面烏頭附子麻黃三味是也治風青丸治風冷痹腰腳疼痛四肢無力及筋骨拘急不能行步青丸方石先生傳附子三兩劈破作三段炮裂川烏頭二兩依上炮麻黃去節四兩上同為末煉蜜丸如梧桐子大每服三二十丸加至三四十丸酒或米飲下不拘時候木香松節丸治下焦風虛腰腳疼痛冷痹不任行李石先生方藏用羌活一兩防風三分五加皮三兩牛膝一兩桂去皮三分不見火木香三分附子一兩炮酸棗仁一兩威靈仙三分酒浸丹參三分虎脛骨一兩塗酥炙萆薢一兩當歸一兩松節一兩銼川烏頭一兩炮上件同搗為末煉蜜和丸如梧桐子大每服三五十丸酒下空心食前木瓜丸治腳氣鼓山升老好木瓜一隻切去蓋除卻子與瓤透明乳香一兩為末入在木瓜內將蓋蓋了四邊用竹針插定銀器盛放飯上蒸爛為度瓷鉢研細入臼搗千百下丸如梧桐子大每服三十丸空心鹽湯吞下日兩三服洗腳氣方治腳膝無力腫痛腳跟如砂石隱痛或不能久立宜用此淋洗藥神妙石先生方蔓荊荊芥苦參臭橘各半兩上件宜處以水一桶子濃煎上半桶子每用先露出兩腳趾不得濕著用荊芥把子蘸藥汁自膝而下淋煠至腳跟候冷熱得所後用手淋稍冷即以厚衣蓋覆甚者不過三上立便愈神仙活絡丹治中風癱瘓手足難舉筋脈拘攣不能舒仰口眼喎斜語澀神昏經絡凝滯肌肉偏枯四肢麻痹時時抽掣林巢先生草烏十兩黑豆一升同醋煮熟去豆不用日乾白芷八兩焙乾木鱉四兩去殼細銼黑牽牛八兩炒白膠香六兩研吳茱萸四兩湯洗揀炒五靈脂四兩槌破酒淘去砂石慢火熬成膏子上為末酒煮稀糊同五靈脂膏子搜和為丸如梧桐子大每服十丸至十五丸空心食前溫酒或鹽湯下預備續命湯諸風預備續命湯治大風風邪入心心痛連背牽痛達心前後痛上下往來或大腹脹滿微痛一寒一熱心中煩悶進退無常面或青黃皆是房室太過虛損勞傷交會後汗出汗出未除或因把扇或因當風而成勞五俞大傷風因外入下有水因變成邪雖是如此然於飲食無退坐起無異至卒不知是五內受邪氣故也名曰行尸宜預備此方石大夫方麻黃六分去節桂心防風去蘆細辛去苗芎藭甘草炙芍藥人參秦艽獨活去土黃芩防己附子炮去皮白朮各三分上十四味切焙為粗末每服五大錢水二大盞薑五片肉棗二個煎取八分溫服日三服忌生蔥海藻菘菜豬肉冰水桃李雀肉等天麻丸治偏頭痛夾腦風攻注眼目腫痛昏暗及頭目眩暈起坐不能郎中於革方天麻一兩附子一兩炮裂去皮尖半夏一兩滾湯蕩洗九次去滑焙荊芥穗半兩木香半兩不見火乳香一分研入桂一分去粗皮不焙川芎半兩上件為細末研勻滴水為丸如梧桐子大每服五丸至十丸臘茶下日三服食前天香散治頭風福首座方半夏湯洗滑令盡切天南星洗切川芎去皮切香白芷洗切上等分為末每服抄四錢水三盞煎去一半入生薑汁半盞煎至八分溫服此藥專治遠年頭風甚者只一兩服永除根本忌房事醒風湯治左癱右瘓口眼喎斜筋脈拳攣手足無力行步艱難附子一隻生用去皮臍切作棋子片天南星生用切作棋子片稱半兩用白朮半兩木香半兩烏藥三錢白附子半兩生用當歸洗半兩防風半兩白芍藥半兩上同為粗末每服四錢水一盞半生薑七片煎至八分去滓溫服不計時候乳香木瓜丸治一切腳氣疼痛腳膝緩弱行步艱難不能屈伸常服二料其效如神徐侍郎方宣州大花木瓜一個切下頂子如甕兒相似取核瓤乳香半兩熟艾半兩茴香半兩青鹽三錢上件藥除木瓜外其餘四味一處搗成細末入在木瓜內蓋定使竹釘合用炊餅劑裹定甑內蒸令熟取出不用麵皮子入砂鉢內再搗極細勻看乾溼得所用好酒打稠麵糊為丸如梧桐子大每服四五十丸溫鹽酒下空心服日二服鹽湯亦得丹方治破傷風治破傷風中風欲倒者上以大魚膠不以多少燒灰細碾為末每服二錢熱酒一盞調藥灌下雖身體強直手足厥冷口內涎出藥到則亦能蘇七烏丸治風疾川烏草烏各三兩去皮臍尖切作火片烏藥去心何首烏各二兩洗淨烏豆八兩淨揀烏梅五十個去核皂角五條湯泡去皮核不蛀者妙上件銼碎用好無灰酒二大升好米醋二大升浸一宿用瓷銚以慢火煮候至川烏通紅為度如川烏未至通紅再添酒醋煮曬焙乾為細末醋煮麵糊為丸如梧桐子大每服三十丸食後茶酒任下漸加至四五十丸香芎散治頭風藥木香不焙麝香旋入人參芎藭羌活洗腦子旋入薄荷去梗白芷真細辛去苗乾薑炮甘草炙上十一味併為細末此藥無分兩目擊其修合只是旋得度大率芎羌活細辛白芷為多木香人參甘草薄荷粗少自前四味一分之二乾薑得其二分而已腦子麝香隨意但有芎辛十分之一記得合得十餘服只買米腦二百金麝香如之每服幾抄四五錢臘茶一錢同調下附子煎丸專治手臂無力麻痹不仁手足不遂風濕相搏筋骨諸疾痛不能舉大附子一個八錢重慢火炮裂去皮臍尖切作十片同生薑米泔淹一宿去薑薄片切焙乾防風一兩骨碎補半兩去毛炒漢防己白朮三味各半兩乳香二錢研旋入上為細末入乳香勻拌好酒煮糊丸如梧桐子大每服二十丸加至三十丸空心食前溫酒吞下日三服沒藥丸治諸風攻刺骨節疼痛及手足頑痹舉動無力久患風人常宜服此大效蠶沙半兩虎骨酥炙黃色半兩蜈蚣一分酥炙木鱉十四個去殼去油天麻半兩當歸一分酒浸一宿牛膝半兩去須乳香一分別研沒藥半兩別研烏藥一分白膠香一分川芎半兩炮去皮尖乾蠍一分上為細末法醋做糊丸如此大茶酒送下七八十丸不拘時候服