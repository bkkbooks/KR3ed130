急中滿四肢浮腫氣不升降小便臭濁胸脅妨悶宜服此藥沉香半兩木香半兩大腹皮三分洗焙陳橘皮去瓤一兩炒木通三分青皮去瓤半兩炒人參半兩白茯苓三分紫蘇連梗用三分桔梗半兩草果仁三分炒半夏湯洗七遍半兩上件為粗飲每服三大錢水一大盞入生薑四片棗子二枚煎至七分去滓空心食前服實氣散能補五臟氣虛脅肋膨脹中滿刺痛白朮十兩當歸微炒厚朴薑汁製白茯苓黃耆炙川烏炮去皮臍桑白皮五加皮續斷炒熟乾地黃以上各四兩枳殼炒香白芷炒牡丹皮炒茴香炒威靈仙洗白芍藥川芎五味子山茱萸山藥白蒺藜炒去刺乾薑炮蓬莪朮炒甘草炙以上各三兩上件為細末用桃仁三兩麥麩炒去皮研令極細和上項藥每服二錢水一盞生薑三片棗子一個煎至七分食前或用鹽湯點亦得生附散大治男子氣血凝滯脾胃受濕腿膝生瘡並宜服此江道人傳白朮半斤人參三兩當歸六兩去須酒浸黃耆四兩蜜炙大甘草二兩炙牛膝六兩酒浸白芍藥半斤生附子二兩白附子二兩防風四兩硬赤茯苓二兩川芎四兩檳榔四兩橘皮六兩上十四味㕮咀每服稱一兩水二盞生薑三十片煎至八分盞熱服人參散治中焦不和脾胃宿冷心腹膨悶嘔逆噁心中滿兩肋䐜脹人參一兩去蘆頭黃耆三分炙去皮石斛三分去根桔梗三分去根白朮三分附子半兩炮去皮臍白茯苓半兩去皮陳皮去白乾稱三分丁香半兩不要焙草豆蔻半兩去皮桂一分去皮不見火上為細末每服二大錢水一大盞生薑三片棗二個煎至七分澄清放溫服不計時候忌酒與濕面附子養氣湯大治久病方愈人上氣急滿痰重黏稠服此壯脾養氣療濕止嘔惡克化水穀進美飲食大附子三兩炮裂水浸削去皮臍切作片子人參一兩切作片子白茯苓一兩切碎白朮一兩紙裹煨切碎木香半兩紙裹炮切碎上件並和勻每服四錢水一盞八分入生薑七片棗子二枚煎至七分去滓空心食前服養氣丸治一切氣疾調脾胃進飲食理腑臟虛滑瀉痢木香丁香白豆蔻肉去皮稱厚朴刮去皮用生薑等分同研杵碎焙乾神麯炒陳橘皮溫湯略浸過刮去白焙乾大麥糵微火炒簸淨茴香微炒以上各一兩川乾薑炮如無面薑代之好甘草炒訶子炮去核各半兩上件研羅為末用白麵作糊為丸如緑豆大每服三五十丸食前人參溫湯下大健脾丸治脾胃虛弱一切冷氣腹痛吐瀉附子一兩炮去皮臍丁香一兩不見火神麯二兩炒人參一兩縮砂仁一兩麥糵二兩炒胡椒一兩桂一兩去皮木瓜二兩川薑一兩炮甘草二兩炙木香二兩茴香一兩炒烏梅肉二兩上件為細末煉蜜為丸如彈子大每服一粒細嚼溫酒鹽湯下食前備急散治冷涎翻胃嘔吐噁心消痰進食李登仕傳上用八錢重附子一隻炮裂去皮臍切作四片用生薑四兩洗淨研自然汁砂石器內入硇砂一錢同煮火止用三二塊慢火熬候薑汁成膏子連薑刮出將附子切碎焙燥入胡椒一百粒丁香一百粒併為細末每服二錢清飯飲調下日二服如欲丸用稀糊丸之十味丁香煮散治脾胃傷冷中脘痞滯宿寒留飲停積不散心腹大痛脅肋膨脹泄利水穀痰逆嘔吐下竭上虛食飲不入肢體大瘦陽氣暴脫姚簽判傳丁香不見火附子炮去皮臍川薑炮裂甘草炙青皮炒陳皮炒益智仁高良薑炒紅豆以上各一兩胡椒半兩上為粗末每服二錢水一盞入生薑三片鹽少許同煎至六分去滓熱服食前升朝散治脾臟虛寒冷氣留滯臟腑不調泄瀉腹痛不思飲食肢體倦痛附子去皮臍炮裂一兩白朮銼炒一兩人參一兩肉豆蔻煨一兩茯苓一兩甘草炒半兩陳皮去白炒半兩烏藥半兩訶子皮半兩白薑灰火中炮裂半兩厚朴生薑汁製炙半兩上件併為細末每服二錢水一大盞生薑三片棗子一個煎至七分食前服如㕮咀飲子每服三錢水一盞半煎至八分去滓服曲術丸健脾胃進飲食治臟腑或泄或祕飲食遲化膈脘痞悶氣滯停痰魏丞相傳神麯八兩將四兩為末打糊麥糵炒白朮厚朴生薑制炒人參去須乾生薑白豆蔻仁肉豆蔻麵裹煨半夏曲各四兩上為細末水打前神麯作糊為丸如梧桐子大每服七十丸至百丸生薑湯或米飲吞下小兒亦可服之集香散治心脾疼邊學諭傳白朮三兩茯苓六兩去皮人參半兩去須丁香半兩木香三兩甘草半兩炙上為細末每服二錢生薑一斤沸湯調服五香棗治嘔吐不止及乾嘔辛總管傳木香丁香人參白朮肉豆蔻上件各等分細銼如粟米大用好大棗子一個去核置藥在內以濕紙裹慢火煨熟細嚼米飲下不拘時候八仙銼散昔宣和初有華山貢士張老人號曰鐵翁居士因入山採藥遇道人在一石岩坐共飲約有八人手中各出一物亦令張翁坐與少酒飲飲數杯各賜手中之物張翁熟視之乃八味藥兼求其方名曰八仙銼散後亦經進藥味下項此方令人飲酒不醉乾葛絞細白者去皮銼白豆蔻去皮殼縮砂仁實者丁香揀新大者以上四味各半兩甘草粉者一分百藥煎酸澀者一分木瓜先煮熟以鹽窨去核加倍用燒鹽一兩上件八位共細銼末為人所不能飲酒後抄一錢細嚼熱酒下皆化小便而出妙甚祕之加減降氣湯治肺滿及浮氣不升降時時喘促兼治風冷痰嗽張維宋傳小兒亦可服紫蘇子紙銚微炒前胡去蘆頭厚朴薑汁浸一宿炒香甘草炙黃陳皮去白當歸半夏曲桂心不見火黃耆生銼焙五加皮薑汁塗炙以上各半兩人參一分沉香一錢半不得見火北桔梗一分去須稱阿膠半兩用黃秫米炒川羌活一分上同為銼散每服二錢水一盞入紫蘇三葉生薑三片棗一枚煎至六分去滓食後服固腸丸治脾胃虛弱內積陰寒冷滯交攻腹肚疼痛兩脅脹悶痰嘔噁心不美進飲食四肢倦重精神不爽常服大壯脾胃美進食老人臟腑泄瀉尤宜服之胡椒炒蓽撥炒川乾薑炮紅豆炒丁香不見火肉豆蔻濕紙裹煨高良薑去須銼炒木香不見火草豆蔻煨陳皮湯浸去白人參去須厚朴去粗皮薑製炙以上各一兩附子炮裂去皮臍肉蓯蓉洗淨酒浸焙鹿茸去皮劈作大片酥炙令黃色縮砂仁各二兩上為細末神麯碾細末作熟糊為丸如梧桐子大候乾每服六十丸米飲吞下空心食前興脾湯治脾胃久冷心腹疼痛胸膈痞悶噫氣不透困倦好睡痰飲結聚脅肋脹痛吞酸嘔逆動則勞倦心意冥然終日忘食脾寒久瘧腸虛滑泄一切脾胃虛寒並皆治之石大夫方良薑一兩炒陳皮一兩洗淨厚朴一兩生薑一兩制附子一兩炮半兩甘草八錢炙白朮半兩藿香葉一分木香一分丁香皮一分上件同為㕮咀每服五錢水二盞煎至一盞去滓溫服不拘時候草豆蔻散治脾胃氣弱脅腹脹滿四肢不和面色青黃不納飲食於醫傳草豆蔻一兩去皮陳橘皮二兩去白桂心一兩去粗皮不見火白朮一兩附子一兩乾薑一兩炮裂木香半兩甘草半兩炙厚朴二兩去粗皮生薑汁塗炙十次上件㕮咀每服二錢水一盞半生薑五片如當二錢厚薄棗子三個煎至八分去滓服不計時候益智散治脾氣虛滯心腹脹滿四肢煩疼少思飲食於醫傳益智去皮一兩沉香三分赤茯苓三令白朮三分甘草一分炙枳殼半兩去瓤麩炒黃去麩檳榔三分紫蘇子三分陳橘皮一兩去白木香半兩上㕮咀每服二錢水一盞半煎至八分去滓溫服食前日進三服氣寶丸治一切氣滯腹中積聚心胸痞滿脹悶喘急及風邪久滯痰涎咳嗽酒食有傷脾胃滯氣膀胱寒氣攻注腰背腳膝皆重不可忍順一切滯氣為氣藥之寶因名氣寶丸舶上茴香揀淨銀石器用紙襯炒稱二兩陳橘皮湯浸去白不用取橘紅焙乾稱一兩木香一分黑牽牛四兩揀淨稱吳茱萸二兩慢火同炒黃取出不用茱萸取牽牛一兩末用之上同為細末拌勻煉蜜和丸如梧桐子大每服十丸至十五丸米飲下或木香湯下有痰即用檳榔末半錢水半盞煎數沸放溫下藥欲微疏動加至三十丸看虛實加減腹稍空服小腸氣痛鹽湯下稀糊和亦得厚朴煎丸孫兆嘗云補腎不若補脾脾胃既壯則能飲食飲食既進能生榮衛榮衛既旺滋養骨髓補益精血是以素問云精不足補之以味形不足溫之以氣宜服厚朴煎丸溫中下氣去痰進食周總領方厚朴一斤極厚者去粗皮銼指面大稱生薑半斤不去皮淨洗切作片子上二味用水五升同煮盡水不用生薑只將厚朴焙乾乾薑四兩銼骰子大甘草二兩銼半寸長上二味用水五升同焙厚朴一處煮煮盡水不用甘草只將乾薑厚朴一處焙乾一本不再煮厚朴舶上茴香四兩附子二兩炮去皮臍上件四味同為細末生薑煮棗肉為丸如梧桐子大每服三五十丸空心米飲或薑棗湯下生氣養胃丸胃者平人常氣水穀之海六腑大源胃和則生氣和胃虛則生氣弱或覺飲食減少中滿噁心或食已妨悶腹脹腸鳴大便祕泄不勻食飲不為肌膚胸脘噎痞噫醋吞酸消冷止痛嗜谷充飢兼治臟腑虛寒泄瀉不止康知周方厚朴四兩去粗皮生薑汁塗炙黃稱肉豆蔻麵裹煨草豆蔻麵裹煨面熟為度白朮丁香各三兩人參去蘆頭神麯炒黃縮砂去皮乾生薑橘皮各二兩上十味為細末用淡糊和丸如梧桐子大每服五七十丸空心食前米飲或熟水下加至百粒歸氣散治真氣不降胸膈痞滿心腹臍脅疼痛不進飲食歸元正氣補脾胃沉香木香川楝子肉炒丁香白薑炮白朮附子二個六錢者炮去皮臍肉桂陳皮去白肉豆蔻麵裹煨去面用當歸葫蘆巴炒益智仁炒舶上茴香炒縮砂仁甘草炙上一十六味各一兩搗羅為細末每服二錢水一盞紫蘇三葉木瓜三四斤鹽少許煎至八分溫熱服食前或食空時服三聖散治心痛不可忍者木香烏藥檳榔上各等分於砂盆內用酒磨之候成濃汁以熱酒浸服或更煎三兩沸服之尤佳
